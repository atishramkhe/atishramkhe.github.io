<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ateaish comics reader</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon_ateaish_comics.svg">
  <style>
    @font-face {
      font-family: 'OumaTrialBold';
      src: url('../fonts/OumaTrial-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'OumaTrialLight';
      src: url('../fonts/OumaTrial-Light.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --page: #000;
      --panel: #030303;
      --line: transparent;
      --text: #f2f2f2;
      --muted: #7d7d7d;
      --accent: #83fdc4;
      --accent-soft: #bfffe4;
      --accent-cool: #83fdc4;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.34);
      --radius: 0px;
      --page-max: 980px;
      --page-zoom: 1;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: 'OumaTrialLight', 'Segoe UI', sans-serif;
      background: #000;
      overflow: hidden;
    }

    body.panel-collapsed .layout {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    body.panel-collapsed .panel {
      padding: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    body[data-theme='slate'] {
      --panel: #060b12;
      --line: transparent;
      --text: #edf5ff;
      --muted: #a8b7c9;
      background: #02060a;
    }

    body[data-theme='paper'] {
      --panel: #f0e6d7;
      --line: transparent;
      --text: #261c14;
      --muted: #6a594a;
      --shadow: 0 12px 32px rgba(48, 30, 12, 0.12);
      background: #e8dece;
    }

    body.reader-restoring {
      overflow: hidden;
    }

    a { color: inherit; }

    .reader-shell {
      width: 100vw;
      margin: 0 auto;
      height: 100dvh;
      padding: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
      gap: 0;
      align-items: stretch;
      min-height: 0;
    }

    .panel,
    .canvas {
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel {
      height: 100%;
      min-height: 0;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      position: relative;
      transition: opacity 220ms ease;
    }

    .panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
      transition: background 220ms ease;
    }

    .panel.is-idle::after {
      background: rgba(0, 0, 0, 0.52);
    }

    .panel-cover {
      width: 100%;
      height: clamp(110px, 18vh, 176px);
      overflow: hidden;
      background: #050505;
    }

    .panel-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .panel-kicker {
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .panel-title {
      margin: 0;
      font-family: 'OumaTrialBold', sans-serif;
      font-size: clamp(1.55rem, 2.5vw, 2.15rem);
      line-height: 0.95;
    }

    .panel-copy,
    .panel-meta,
    .status-copy,
    .empty-copy {
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.88rem;
    }

    .panel-meta {
      margin: 4px 0 0;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .control-group {
      margin-top: 0;
      display: grid;
      gap: 8px;
    }

    .control-label {
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .issue-select,
    .width-select,
    .control-select {
      width: 100%;
      min-height: 42px;
      border-radius: 0;
      border: 0;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      color-scheme: dark;
      font: inherit;
      padding: 0 14px;
      outline: 1px solid transparent;
      transition: outline-color 140ms ease, background 140ms ease;
    }

    .issue-select:focus,
    .width-select:focus,
    .control-select:focus {
      outline-color: rgba(131, 253, 196, 0.5);
      box-shadow: 0 0 0 2px rgba(131, 255, 196, 0.12);
      background: rgba(255, 255, 255, 0.08);
    }

    .issue-select option,
    .width-select option,
    .control-select option,
    .issue-select optgroup,
    .width-select optgroup,
    .control-select optgroup {
      background: #070d0b;
      color: #f3fffb;
    }

    .button-row,
    .link-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .button,
    .link-button {
      min-height: 42px;
      border-radius: 0;
      border: 0;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease;
    }

    .button:hover,
    .button:focus-visible,
    .link-button:hover,
    .link-button:focus-visible {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
    }

    .button.primary,
    .link-button.primary {
      border-color: transparent;
      background: var(--accent);
      color: #03130d;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.4;
      transform: none;
    }

    .canvas {
      position: relative;
      padding: 18px 26px;
      height: 100%;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      touch-action: pan-y pinch-zoom;
      -webkit-overflow-scrolling: touch;
    }

    .canvas[data-fit='vertical'] {
      padding-block: 0;
      scroll-snap-type: y mandatory;
    }

    .canvas[data-fit='horizontal'] .page-card {
      width: min(calc(var(--page-max) * var(--page-zoom)), calc(100% * var(--page-zoom)));
      min-height: 0;
    }

    .canvas[data-fit='vertical'] .page-card {
      width: min(calc(var(--page-max) * var(--page-zoom)), calc(100% * var(--page-zoom)));
      min-height: 100dvh;
      display: grid;
      align-content: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .canvas[data-fit='native'] .page-card {
      width: min(calc(var(--page-max) * var(--page-zoom)), calc(100% * var(--page-zoom)));
      min-height: 0;
    }

    .canvas[data-fit='vertical'] .page-card img {
      width: auto;
      max-width: 100%;
      height: 100dvh;
      max-height: 100dvh;
      object-fit: contain;
      margin: 0 auto;
    }

    .restore-shell {
      position: absolute;
      inset: 18px;
      display: none;
      place-items: center;
      text-align: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.92);
      z-index: 2;
    }

    .canvas[data-align='left'] .page-stack {
      justify-items: start;
    }

    .canvas[data-align='center'] .page-stack {
      justify-items: center;
    }


    .page-stack {
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .canvas[data-gap='flush'] .page-stack { gap: 0; }
    .canvas[data-gap='tight'] .page-stack { gap: 12px; }
    .canvas[data-gap='comfortable'] .page-stack { gap: 18px; }
    .canvas[data-gap='airy'] .page-stack { gap: 28px; }

    .canvas[data-captions='hidden'] .page-caption {
      display: none;
    }

    .page-card {
      margin: 0;
      width: min(calc(var(--page-max) * var(--page-zoom)), calc(100% * var(--page-zoom)));
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      touch-action: pan-y pinch-zoom;
    }

    .page-card img {
      display: block;
      width: 100%;
      height: auto;
      background: #0c0d12;
      touch-action: pan-y pinch-zoom;
    }

    .page-caption {
      padding: 10px 14px;
      color: var(--muted);
      font-size: 0.84rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
    }

    .status-shell,
    .empty-shell {
      min-height: 320px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
    }

    .status-title,
    .empty-title {
      margin: 0 0 10px;
      font-family: 'OumaTrialBold', sans-serif;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 0.95;
    }

    .canvas[data-width='narrow'] { --page-max: 760px; }
    .canvas[data-width='standard'] { --page-max: 980px; }
    .canvas[data-width='wide'] { --page-max: 1220px; }
    .canvas[data-width='ultra'] { --page-max: 1440px; }
    .canvas[data-zoom='70'] { --page-zoom: 0.7; }
    .canvas[data-zoom='85'] { --page-zoom: 0.85; }
    .canvas[data-zoom='100'] { --page-zoom: 1; }
    .canvas[data-zoom='115'] { --page-zoom: 1.15; }
    .canvas[data-zoom='130'] { --page-zoom: 1.3; }
    .canvas[data-zoom='150'] { --page-zoom: 1.5; }

    @media (max-width: 1020px) {
      .layout { grid-template-columns: 1fr; }
      .panel {
        overflow: auto;
      }
      body { overflow: auto; }
      .reader-shell { height: auto; min-height: 100dvh; }
      .canvas,
      .panel,
      .layout { min-height: auto; height: auto; }
      .canvas {
        overflow: visible;
        overscroll-behavior: auto;
      }
    }

    @media (max-width: 720px) {
      .reader-shell { width: min(100vw - 16px, 1480px); }
      .panel,
      .canvas { padding: 16px; }
      .button-row,
      .link-row { grid-template-columns: 1fr; }
      .controls-grid { grid-template-columns: 1fr; }
    }
    .close-reader {
      border: 0;
      width: 40px;
      height: 40px;
      border-radius: 0;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease;
    }
    .close-reader:hover { transform: translateY(-1px); background: rgba(255,255,255,0.08); }

    .floating-controls {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 30;
      display: grid;
      gap: 10px;
    }

    .floating-control {
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      background: rgba(10, 10, 10, 0.9);
      color: var(--accent);
      border: 1px solid rgba(131, 253, 196, 0.22);
    }

    body[data-theme='paper'] .floating-control {
      background: rgba(251, 244, 232, 0.92);
    }

    @media (max-width: 720px) {
      .floating-controls {
        right: 14px;
        bottom: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="reader-shell">
    <div class="layout">
      <aside class="panel">
        <div class="panel-cover"><img id="series-cover" src="./assets/ateaish_comics_default.webp" alt=""></div>

        <div class="control-group">
          <label class="control-label" for="issue-select">Issue</label>
          <select id="issue-select" class="issue-select"></select>
          <div class="button-row">
            <button id="prev-issue" class="button" type="button">Previous</button>
            <button id="next-issue" class="button" type="button">Next</button>
          </div>
        </div>

        <div class="control-group">
          <label class="control-label" for="width-select">Reading width</label>
          <select id="width-select" class="width-select">
            <option value="narrow">Narrow</option>
            <option value="standard" selected>Standard</option>
            <option value="wide">Wide</option>
            <option value="ultra">Ultra</option>
          </select>
        </div>

        <div class="controls-grid">
          <div class="control-group">
            <label class="control-label" for="page-fit-select">Page fitting</label>
            <select id="page-fit-select" class="control-select">
              <option value="horizontal" selected>Fit horizontally</option>
              <option value="vertical">Fit vertically</option>
              <option value="native">Native size</option>
            </select>
          </div>

          <div class="control-group">
            <label class="control-label" for="page-gap-select">Page spacing</label>
            <select id="page-gap-select" class="control-select">
              <option value="flush">Flush</option>
              <option value="tight">Tight</option>
              <option value="comfortable" selected>Comfortable</option>
              <option value="airy">Airy</option>
            </select>
          </div>

          <div class="control-group">
            <label class="control-label" for="zoom-select">Zoom</label>
            <select id="zoom-select" class="control-select">
              <option value="70">70%</option>
              <option value="85">85%</option>
              <option value="100" selected>100%</option>
              <option value="115">115%</option>
              <option value="130">130%</option>
              <option value="150">150%</option>
            </select>
          </div>

          <div class="control-group">
            <label class="control-label" for="align-select">Page alignment</label>
            <select id="align-select" class="control-select">
              <option value="center" selected>Center</option>
              <option value="left">Left</option>
            </select>
          </div>

          <div class="control-group">
            <label class="control-label" for="theme-select">Reader theme</label>
            <select id="theme-select" class="control-select">
              <option value="midnight" selected>Midnight</option>
              <option value="slate">Slate</option>
              <option value="paper">Paper</option>
            </select>
          </div>
        </div>

        <div class="button-row" style="margin-top: 10px;">
          <button id="zoom-out" class="button" type="button">Zoom out</button>
          <button id="zoom-in" class="button" type="button">Zoom in</button>
        </div>

        <div class="button-row" style="margin-top: 10px;">
          <button id="toggle-captions" class="button" type="button">Hide captions</button>
          <button id="toggle-panel" class="button" type="button">Focus mode</button>
        </div>
        
        <div class="button-row" style="margin-top: 10px;">
          <button id="toggle-later" class="button" type="button">Read later</button>
          <button id="toggle-finished" class="button" type="button">Mark finished</button>
        </div>

        <div class="control-group">
          <div class="link-row">
            <a id="series-link" class="link-button primary" href="#" target="_blank" rel="noreferrer">Series page</a>
            <a id="issue-link" class="link-button" href="#" target="_blank" rel="noreferrer">Source issue</a>
          </div>
        </div>
      </aside>

      <section id="canvas" class="canvas" data-width="standard" aria-live="polite">
        <div id="canvas-status" class="status-shell">
          <div>
            <h2 class="status-title">Loading reader</h2>
            <p class="status-copy">Fetching the extracted manifest and preparing the issue pages.</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="floating-controls" aria-label="Reader controls">
    <button id="floating-panel" class="close-reader floating-control" type="button" aria-label="Toggle reader panel">☰</button>
    <button id="floating-fullscreen" class="close-reader floating-control" type="button" aria-label="Toggle fullscreen">⛶</button>
    <button id="floating-exit" class="close-reader floating-control" type="button" aria-label="Exit reader">✕</button>
  </div>

  <script src="./reader.js" defer></script>
</body>
</html>
