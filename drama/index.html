        try {
            const drama = await kisskh(`/Drama/${dramaId}?is498=false`);

            const episodes = (drama.episodes || []).sort((a, b) => a.number - b.number);

            content.innerHTML = `
                <div class="detail-header">
                    <img class="detail-thumb" src="${drama.thumbnail}" alt="${drama.title}"
                         onerror="this.style.display='none'">
                    <div class="detail-info">
                        <div class="detail-title">${drama.title}</div>
                        <div class="detail-meta">
                            <span>${drama.releaseDate ? drama.releaseDate.slice(0, 10) : ''}</span>
                            <span>${drama.country || ''}</span>
                            <span>${drama.status || ''}</span>
                            <span>${drama.type || ''}</span>
                            <span>${drama.episodesCount || 0} Episodes</span>
                        </div>
                        <div class="detail-desc">${drama.description || 'No description available.'}</div>
                        <div class="detail-actions">
                            <button id="detail-resume-btn" class="detail-action-btn" type="button"></button>
                            <button id="detail-watch-later-btn" class="detail-action-btn" type="button" data-drama-id="${drama.id}"></button>
                            <button id="detail-finished-btn" class="detail-action-btn" type="button" data-drama-id="${drama.id}"></button>
                        </div>
                    </div>
                </div>
            `;

            // Check if there's saved progress for this drama
            const savedProgress = localStorage.getItem(`kisskh_progress_${dramaId}`);
            const parsedProgress = savedProgress ? JSON.parse(savedProgress) : null;
            const savedEp = parsedProgress ? parsedProgress.episode : null;
            const savedTime = parsedProgress ? parsedProgress.currentTime : null;
            const firstEpisode = episodes[0] ? Math.floor(Number(episodes[0].number)) : 1;

            const resumeBtn = document.getElementById('detail-resume-btn');
            resumeBtn.textContent = savedEp ? `Continue Watching EP ${savedEp}` : 'Play';
            resumeBtn.addEventListener('click', () => {
                const targetEpisode = savedEp || firstEpisode;
                openPlayer(dramaId, drama.title, targetEpisode, savedEp ? savedTime : null);
                saveContinueWatching(dramaId, drama.title, drama.thumbnail, targetEpisode, drama.episodesCount);
            });

            const watchLaterBtn = document.getElementById('detail-watch-later-btn');
            watchLaterBtn.addEventListener('click', () => toggleWatchLater(drama));

            const finishedBtn = document.getElementById('detail-finished-btn');
            finishedBtn.addEventListener('click', () => toggleFinished(drama, { episode: savedEp || drama.episodesCount || firstEpisode }));

            syncPosterStateBadges(drama.id);

        } catch (err) {
            console.error('Detail error:', err);
            content.innerHTML = '<p style="color:#555;text-align:center;padding:60px;">Failed to load drama details.</p>';
        }
    }

    function closeDetail() {
        document.getElementById('detail-modal').style.display = 'none';
        document.body.style.overflow = '';
    }

    // ── Player ──
    function openPlayer(dramaId, title, episodeNumber, resumeTime) {
        const slug = slugify(title);
        // kisskh uses integer episode numbers in the URL
        const epNum = Math.floor(Number(episodeNumber));
        let url = `${KISSKH_BASE}/Drama/${slug}/Episode-${epNum}?id=${dramaId}`;

        const hashParts = [`ateaish_episode=${epNum}`];

        // Append resume position as hash so userscript can pick it up
        if (resumeTime && resumeTime > 5) {
            hashParts.push(`ateaish_resume=${Math.floor(resumeTime)}`);
        }

        url += `#${hashParts.join('&')}`;

        const playerContainer = document.getElementById('player-container');
        const playerContent = document.getElementById('player-content');

        playerContent.innerHTML = `<iframe id="player-iframe" src="${url}" referrerpolicy="no-referrer" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>`;
        playerContainer.style.display = 'block';
        document.body.style.overflow = 'hidden';

        // Track what's playing for continue watching
        _currentPlaying = { dramaId, title, episode: epNum };

        // Close detail modal if open
        document.getElementById('detail-modal').style.display = 'none';

        // Backup: send commands via postMessage after iframe loads
        const iframe = document.getElementById('player-iframe');
        const sendCommand = (cmd) => {
            try { iframe.contentWindow.postMessage({ source: 'ateaish-drama', ...cmd }, '*'); } catch (e) {}
        };

        // Tell userscript which episode to navigate to + highlight
        const sendNav = () => sendCommand({ command: 'navigateEpisode', episode: epNum });
        const sendHighlight = () => sendCommand({ command: 'highlightEpisode', episode: epNum });
        setTimeout(sendNav, 2000);
        setTimeout(sendNav, 5000);
        setTimeout(sendHighlight, 2500);
        setTimeout(sendHighlight, 5500);

        iframe.addEventListener('load', () => {
            setTimeout(sendNav, 1200);
            setTimeout(sendHighlight, 1800);
        });

        // Send seek for resume position
        if (resumeTime && resumeTime > 5) {
            const sendSeek = () => sendCommand({ command: 'seek', time: resumeTime });
            setTimeout(sendSeek, 3000);
            setTimeout(sendSeek, 6000);
            setTimeout(sendSeek, 10000);
        }
    }

    let _currentPlaying = null;

    function closePlayer() {
        const playerContainer = document.getElementById('player-container');
        const playerContent = document.getElementById('player-content');
        playerContainer.style.display = 'none';
        playerContent.innerHTML = '';
        document.body.style.overflow = '';
        _currentPlaying = null;
        loadContinueWatching();
    }

    }

    // ── Listen for messages from ateaish_drama_helpers userscript ──
    window.addEventListener('message', (event) => {
        if (!event.data || event.data.source !== 'ateaish-drama-helper') return;

        const { type, dramaId, episode, currentTime, duration, percent } = event.data;

        if (!dramaId) return;

        // Update continue watching with real progress from the userscript
        if (type === 'progress' || type === 'pause' || type === 'ended') {
            const key = `kisskh_progress_${dramaId}`;
            const existing = JSON.parse(localStorage.getItem(key) || '{}');
            existing.id = dramaId;
            existing.episode = episode || existing.episode;
            existing.currentTime = currentTime || 0;
            existing.videoDuration = duration || 0;
            existing.videoPercent = percent || 0;
            existing.updatedAt = Date.now();
            // Save slug from userscript if available
            if (event.data.slug) existing.slug = event.data.slug;
            // Backfill title from current playing context
            if (!existing.title && _currentPlaying) existing.title = _currentPlaying.title;
            localStorage.setItem(key, JSON.stringify(existing));

            if (existing.totalEpisodes && Number(existing.episode) >= Number(existing.totalEpisodes) && (type === 'ended' || Number(existing.videoPercent || 0) >= 90)) {
                storeFinished(existing, { episode: existing.episode });
                syncPosterStateBadges(dramaId);
            }
        }

        // When episode changes inside the iframe, update tracking
        if (type === 'episodeChange' && episode) {
            const key = `kisskh_progress_${dramaId}`;
            const existing = JSON.parse(localStorage.getItem(key) || '{}');
            existing.id = dramaId;
            existing.episode = episode;
            existing.currentTime = 0;
            existing.videoPercent = 0;
            existing.updatedAt = Date.now();
            localStorage.setItem(key, JSON.stringify(existing));
            _currentPlaying = { ...(_currentPlaying || {}), dramaId, episode };
        }

        // When episode ends, could auto-refresh continue watching
        if (type === 'ended') {
            console.log(`[ateaish drama] EP ${episode} ended`);
        }

        refreshSavedSections();
    });

    // ── Continue Watching ──
    function saveContinueWatching(dramaId, title, thumbnail, episode, totalEpisodes) {
        const key = `kisskh_progress_${dramaId}`;
        const existing = getSavedProgress(dramaId) || {};
        const data = {
            id: dramaId,
            title: title,
            thumbnail: thumbnail,
            episode: episode,
            totalEpisodes: totalEpisodes,
            currentTime: existing.episode === episode ? (existing.currentTime || 0) : 0,
            videoDuration: existing.episode === episode ? (existing.videoDuration || 0) : 0,
            videoPercent: existing.episode === episode ? (existing.videoPercent || 0) : 0,
            updatedAt: Date.now()
        };
        localStorage.setItem(key, JSON.stringify(data));
        refreshAllPosterMetadata();
    }

    function loadContinueWatching() {
        const grid = document.getElementById('continueGrid');
        if (!grid) return;
        grid.innerHTML = '';

        const items = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('kisskh_progress_')) {
                try {
                    items.push(JSON.parse(localStorage.getItem(key)));
                } catch (e) {}
            }
        }

        items.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        const toShow = items.filter(item => !isFinished(item.id)).slice(0, 10);

        if (toShow.length === 0) {
            grid.closest('section').style.display = 'none';
            return;
        }
        grid.closest('section').style.display = '';

        toShow.forEach(item => {
            const div = document.createElement('div');
            div.className = 'poster';
            div.style.position = 'relative';

            // Use video-level progress if available, else episode-level
            let percent = 0;
            if (item.videoPercent && item.videoPercent > 0) {
                // Within-episode progress from the userscript
                percent = Math.min(100, Math.round(item.videoPercent));
            } else if (item.totalEpisodes) {
                percent = Math.round((item.episode / item.totalEpisodes) * 100);
            }

            // Remove button
            const removeBtn = document.createElement('button');
            removeBtn.innerHTML = '&times;';
            removeBtn.title = 'Remove';
            removeBtn.style.cssText = `
                position:absolute; top:6px; right:8px; background:rgba(0,0,0,0.7);
                color:#fff; border:none; font-size:1.5em; cursor:pointer;
                padding:0 6px; border-radius:50%; display:none; z-index:2;
            `;
            div.addEventListener('mouseenter', () => removeBtn.style.display = 'block');
            div.addEventListener('mouseleave', () => removeBtn.style.display = 'none');
            removeBtn.onclick = (e) => {
                e.stopPropagation();
                localStorage.removeItem(`kisskh_progress_${item.id}`);
                loadContinueWatching();
            };

            div.innerHTML = `
                <img src="${item.thumbnail}" alt="${item.title}" loading="lazy"
                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 9%22><rect fill=%22%23111%22 width=%2216%22 height=%229%22/></svg>'">
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3em;opacity:0.7;pointer-events:none;text-shadow:0 2px 8px #000;">&#9654;</div>
                <div class="poster-info">
                    <div class="poster-title">${item.title}</div>
                    <div class="poster-meta">&#9654; Resume EP ${item.episode}/${item.totalEpisodes || '?'}</div>
                </div>
                <div class="continue-progress"><div class="continue-progress-bar" style="width:${percent}%"></div></div>
            `;
            div.onclick = () => openPlayer(item.id, item.title, item.episode, item.currentTime);
            div.appendChild(removeBtn);
            grid.appendChild(div);
        });
    }

    function loadStoredPosterSection(sectionId, gridId, prefix, limit = 16) {
        const section = document.getElementById(sectionId);
        const grid = document.getElementById(gridId);
        if (!section || !grid) return;

        const items = collectStoredDramas(prefix)
            .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
            .slice(0, limit);

        grid.innerHTML = '';

        if (!items.length) {
            section.style.display = 'none';
            return;
        }

        section.style.display = '';
        items.forEach(item => {
            grid.appendChild(createPosterCard(item, gridId));
        });
    }

    function loadWatchLater() {
        loadStoredPosterSection('watchLaterSection', 'watchLaterGrid', WATCH_LATER_KEY_PREFIX);
    }

    function loadFinished() {
        loadStoredPosterSection('finishedSection', 'finishedGrid', FINISHED_KEY_PREFIX);
    }

    // ── Event Listeners ──
    document.addEventListener('DOMContentLoaded', async () => {
        // Wait for userscript API bridge on production (up to 2s)
        if (!IS_LOCAL) {
            const bridgeOk = await waitForBridge(2000);
            _preferSnapshot = !bridgeOk;
            if (_preferSnapshot) {
                try {
                    await ensureSnapshotLoaded();
                    console.log('[drama] Snapshot fallback enabled');
                } catch (err) {
                    console.warn('[drama] Snapshot preload failed:', err.message);
                }
            }
            console.log('[drama] Bridge available:', bridgeOk);
        }

        // Load home
        loadHome();
        initShowcase();
        renderSectionNav();
        populateSearchFilters()
            .then(() => refreshAllPosterMetadata())
            .catch(err => console.warn('[drama] Search filters failed:', err.message));

        // Search
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-search-btn');
        const closeSearchBtn = document.getElementById('close-search-view');
        const searchFiltersToggle = document.getElementById('search-filters-toggle');
        const searchResults = document.getElementById('search-results');
        const backToTopBtn = document.getElementById('backtotop-btn');
        const sectionNavToggle = document.getElementById('section-nav-toggle');
        const sectionNavList = document.getElementById('section-nav-list');
        const searchCountryFilter = document.getElementById('search-country-filter');
        const searchYearFilter = document.getElementById('search-year-filter');
        const searchStatusFilter = document.getElementById('search-status-filter');
        const searchTypeFilter = document.getElementById('search-type-filter');
        const searchSortFilter = document.getElementById('search-sort-filter');

        const scheduleSearch = () => {
            const val = searchInput.value.trim();
            clearBtn.style.display = val ? 'block' : 'none';
            setSearchUiState(val);
            clearTimeout(searchTimeout);
            if (!hasSearchConstraints(val)) return;
            searchTimeout = setTimeout(() => performSearch(val), 250);
        };

        searchInput.addEventListener('input', (e) => {
            scheduleSearch();
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearBtn.style.display = 'none';
            setSearchUiState('');
            if (hasActiveAdvancedSearchFilters()) {
                scheduleSearch();
            }
            searchInput.focus();
        });

        closeSearchBtn.addEventListener('click', () => {
            closeSearchView();
        });

        searchFiltersToggle.addEventListener('click', () => {
            const searchTools = document.getElementById('search-tools');
            setSearchFiltersVisible(!searchTools.classList.contains('visible'));
        });

        document.querySelectorAll('.search-filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                setSearchFiltersVisible(true);
                document.querySelectorAll('.search-filter-chip').forEach(item => item.classList.remove('active'));
                chip.classList.add('active');
                _searchFilters.tag = chip.dataset.searchTag || 'all';
                scheduleSearch();
            });
        });

        [
            [searchCountryFilter, 'country'],
            [searchYearFilter, 'year'],
            [searchStatusFilter, 'status'],
            [searchTypeFilter, 'type'],
            [searchSortFilter, 'sort'],
        ].forEach(([element, key]) => {
            element.addEventListener('change', () => {
                setSearchFiltersVisible(true);
                _searchFilters[key] = element.value;
                scheduleSearch();
            });
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        sectionNavToggle.addEventListener('click', () => {
            const nextOpen = sectionNavList.style.display !== 'grid';
            renderSectionNav();
            setSectionNavOpen(nextOpen);
        });

        document.addEventListener('click', (event) => {
            if (!sectionNavList.contains(event.target) && !sectionNavToggle.contains(event.target)) {
                setSectionNavOpen(false);
            }
        });

        // Filter tabs
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                currentFilter = filter;
                const showcaseSection = document.getElementById('showcaseSection');

                if (filter === 'home') {
                    if (showcaseSection && _showcaseCandidates.length) showcaseSection.hidden = false;
                    document.getElementById('homeView').style.display = '';
                    document.getElementById('filteredView').style.display = 'none';
                } else {
                    if (showcaseSection) showcaseSection.hidden = true;
                    document.getElementById('homeView').style.display = 'none';
                    document.getElementById('filteredView').style.display = '';
                    loadFiltered(filter, true);
                }

                renderSectionNav();
                setSectionNavOpen(false);
            });
        });

        // Load more
        document.getElementById('loadMoreBtn').addEventListener('click', () => {
            loadFiltered(currentFilter, false);
        });

        // Close detail modal
        document.getElementById('detail-close').addEventListener('click', closeDetail);
        document.getElementById('detail-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detail-modal')) closeDetail();
        });

        // Close player
        document.getElementById('close-player').addEventListener('click', closePlayer);

        // Keyboard: Escape closes modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                setSectionNavOpen(false);
                if (document.getElementById('player-container').style.display === 'block') {
                    closePlayer();
                } else if (document.getElementById('detail-modal').style.display === 'block') {
                    closeDetail();
                }
            }
        });
    });
    </script>
</body>
