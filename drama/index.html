<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ateaish dramas</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon_ateaish_dramas.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script defer src="../master-navigation.js"></script>
    <style>
        @font-face { font-family: 'OumaTrialBold'; src: url('../fonts/OumaTrial-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
        @font-face { font-family: 'OumaTrialLight'; src: url('../fonts/OumaTrial-Light.ttf') format('truetype'); font-weight: 300; font-style: normal; font-display: swap; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #fff;
            font-family: 'OumaTrialLight', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            --accent: #fc35a5;
            --accent-rgb: 252, 53, 165;
            --ateaish-master-nav-accent: var(--accent);
            --ateaish-master-nav-accent-rgb: var(--accent-rgb);
            --ateaish-master-nav-text: #fff5f6;
        }

        #hero-wrapper {
            position: relative;
            overflow: hidden;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #hero-wrapper.showcase-has-bg {
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 96px;
            border-bottom: 0px solid #111;
            font-family: 'OumaTrialBold', 'OumaTrialLight';
            z-index: 50;
            background: transparent;
        }
        .logo-placeholder {
            width: 220px; height: 72px;
            background: transparent; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #888; font-size: 1.2rem; font-weight: 500; letter-spacing: 2px;
            cursor: pointer;
        }
        .logo-placeholder img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none; position: absolute;
            background-color: #000; min-width: 120px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            padding: 8px 0; z-index: 60; right: 0; top: 100%; border-radius: 8px;
        }
        .dropdown.open .dropdown-content { display: block; }
        .dropdown-content a {
            display: flex; align-items: center; justify-content: center;
            padding: 8px 0; text-decoration: none; background: none;
        }
        .dropdown-content a img { height: 100px; width: 100px; object-fit: contain; }

        .floating-master-nav-slot {
            position: fixed;
            right: 32px;
            bottom: 116px;
            width: 72px;
            height: 72px;
            z-index: 95;
        }

        .page-float-strip {
            position: fixed;
            right: 32px;
            bottom: 32px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 72px));
            gap: 12px;
            z-index: 93;
        }
        .floating-page-btn {
            width: 72px;
            height: 72px;
            border: none;
            border-radius: 16px;
            background: #000;
            color: var(--accent);
            font-family: 'OumaTrialBold', 'OumaTrialLight';
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px #0006;
            transition: transform 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
        }
        .floating-page-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 24px rgba(var(--accent-rgb), 0.18);
        }
        #section-nav-list {
            position: fixed;
            right: 32px;
            bottom: 200px;
            display: none;
            grid-template-columns: repeat(2, minmax(140px, auto));
            gap: 10px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.96);
            border: 1px solid rgba(var(--accent-rgb), 0.25);
            border-radius: 18px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
            z-index: 94;
        }
        .section-nav-btn {
            background: #0c0c0c;
            color: #fff;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 10px 14px;
            font-family: 'OumaTrialLight';
            font-size: 0.92rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }
        .section-nav-btn:hover {
            background: rgba(var(--accent-rgb), 0.14);
            border-color: rgba(var(--accent-rgb), 0.5);
            color: var(--accent);
        }

        /* ===== SEARCH ===== */
        #search-container {
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0 10px 0; position: relative;
        }
        .search-wrapper { position: relative; width: 90%; max-width: 500px; }
        #search-input {
            width: 100%; padding: 0.6em 2.5em 0.6em 0.8em;
            font-size: 1.1em; background: #000; color: #fff;
            font-family: 'OumaTrialLight'; border: 1px solid #222; border-radius: 4px;
            outline: none; transition: border-color 0.2s;
        }
        #search-input:focus { border-color: var(--accent); }
        #clear-search-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            font-size: 1.5rem; background: transparent; border: none;
            color: #fff; cursor: pointer; z-index: 2; display: none;
        }
        #search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
            padding: 20px 40px;
            max-width: 2000px;
            margin: 0 auto;
            width: 100%;
        }
        #search-results-wrapper {
            display: none;
            background: rgba(0, 0, 0, 0.72);
        }
        #search-results-wrapper.active {
            display: block;
        }
        #search-action-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            min-height: 42px;
            padding-top: 10px;
        }
        #search-filters-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #111;
            color: #fff;
            border: 1px solid #242424;
            border-radius: 999px;
            padding: 8px 16px;
            font-family: 'OumaTrialBold';
            font-size: 0.86rem;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }
        #search-filters-toggle:hover,
        #search-filters-toggle.is-open {
            transform: translateY(-1px);
            background: rgba(var(--accent-rgb), 0.14);
            border-color: rgba(var(--accent-rgb), 0.45);
            color: var(--accent);
        }
        #close-search-view {
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(var(--accent-rgb), 0.14);
            color: var(--accent);
            border: 1px solid rgba(var(--accent-rgb), 0.45);
            border-radius: 999px;
            padding: 8px 16px;
            font-family: 'OumaTrialBold';
            font-size: 0.86rem;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        #close-search-view:hover {
            transform: translateY(-1px);
            background: rgba(var(--accent-rgb), 0.2);
        }
        #search-tools {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px 6px;
        }
        #search-tools.visible {
            display: flex;
        }
        .search-filter-chip,
        .search-filter-select {
            background: #0d0d0d;
            color: #cfcfcf;
            border: 1px solid #242424;
            border-radius: 999px;
            font-family: 'OumaTrialLight';
            font-size: 0.88rem;
            padding: 8px 14px;
            transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }
        .search-filter-chip {
            cursor: pointer;
        }
        .search-filter-chip:hover,
        .search-filter-select:hover,
        .search-filter-select:focus {
            border-color: rgba(var(--accent-rgb), 0.5);
            color: #fff;
            outline: none;
        }
        .search-filter-chip.active {
            background: rgba(var(--accent-rgb), 0.14);
            border-color: var(--accent);
            color: var(--accent);
        }
        .search-filter-select {
            min-width: 132px;
            cursor: pointer;
        }
        #search-results-status {
            padding: 2px 40px 0;
            color: #8a8a8a;
            font-size: 0.82rem;
            text-align: center;
            min-height: 20px;
        }

        #mainContent {
            background: transparent;
        }
        #showcaseSection,
        #showcaseSection > #showcase {
            background: transparent;
        }
        #homeView > section:not(#showcaseSection),
        #filteredView {
            position: relative;
            background: #000;
        }

        /* ===== FILTER TABS ===== */
        .filter-bar {
            display: flex; justify-content: center; gap: 8px;
            padding: 12px 20px; flex-wrap: wrap;
        }
        .filter-btn {
            background: #111; color: #aaa; border: 1px solid #222;
            padding: 6px 16px; border-radius: 20px; cursor: pointer;
            font-family: 'OumaTrialLight'; font-size: 0.9em; transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ===== SHOWCASE (ported from /movies) ===== */
        #showcaseSection {
            max-width: 2000px;
            margin: 0 auto;
            width: 100%;
            min-height: calc(100vh - 96px);
            display: flex;
            align-items: center;
        }
        #showcase {
            position: relative;
            width: 100%;
            max-width: 2000px;
            margin: 0 auto 0 auto;
            min-height: calc(100vh - 128px);
            max-height: calc(100vh - 96px);
            padding: clamp(28px, 4vh, 44px) 60px clamp(32px, 4.5vh, 52px) 60px;
            box-sizing: border-box;
            border-radius: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 60px;
            font-family: 'OumaTrialLight';
            isolation: isolate;
        }
        #showcase::after {
            content: "";
            position: absolute;
            inset: 0;
            background: transparent;
            mix-blend-mode: normal;
            z-index: -2;
            pointer-events: none;
        }
        .showcase-left {
            flex: 0 0 clamp(260px, 22vw, 320px);
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 24px;
            position: relative;
            backdrop-filter: blur(1px);
            -webkit-backdrop-filter: blur(1px);
            border-radius: 12px;
        }
        .showcase-logo-wrapper {
            width: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 72px;
        }
        .showcase-logo-wrapper img {
            width: min(100%, 340px);
            max-height: 72px;
            align-items: center;
            object-fit: contain;
            filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.8));
        }
        .showcase-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: nowrap;
        }
        .showcase-btn {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: 'OumaTrialBold';
            font-size: 1.05em;
            letter-spacing: 0.5px;
            padding: 14px 36px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background .22s ease, transform .18s ease, box-shadow .22s ease;
            position: relative;
        }
        .showcase-btn.primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 18px -4px rgba(var(--accent-rgb), 0.55), 0 2px 6px -2px rgba(0, 0, 0, 0.65);
        }
        .showcase-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px -6px rgba(var(--accent-rgb), 0.7), 0 4px 10px -2px rgba(0, 0, 0, 0.75);
        }
        .showcase-btn.secondary {
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            backdrop-filter: blur(3px);
            box-shadow: 0 4px 14px -4px rgba(0, 0, 0, 0.85);
        }
        .showcase-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.20);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.7);
        }
        .showcase-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }
        .showcase-meta {
            display: flex;
            align-items: center;
            gap: 18px;
            padding-bottom: 16px;
            flex-wrap: wrap;
            font-size: 0.9em;
            letter-spacing: 0.5px;
            color: #ccc;
        }
        .showcase-left-bottom {
            background: #0009;
            overflow: visible;
            border-radius: 12px;
            padding: 10px;
            max-height: calc(100vh - 320px);
            overflow-y: auto;
        }
        .showcase-title {
            display: none;
            font-family: 'OumaTrialBold';
            font-size: clamp(2.4em, 5.2vw, 4.4em);
            line-height: 0.95;
            margin: 0;
            letter-spacing: 1px;
            text-shadow: 0 8px 28px rgba(0, 0, 0, 0.75), 0 3px 10px rgba(0, 0, 0, 0.6);
        }
        .showcase-overview {
            font-size: 0.95em;
            line-height: 1.5;
            max-width: 900px;
            color: #ddd;
            margin: 0;
            text-shadow: 0 2px 8px rgba(0, 0, 0);
            position: relative;
            padding-bottom: 16px;
        }
        .showcase-overview.long {
            max-height: 180px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, rgb(0, 0, 0) 70%, rgba(255, 255, 255, 0));
        }
        .showcase-overview.expanded {
            max-height: none;
            mask-image: none;
        }
        .showcase-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .showcase-tag {
            font-size: 0.65em;
            letter-spacing: 1px;
            padding: 4px 8px 5px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            color: #bbb;
            text-transform: uppercase;
            font-family: 'OumaTrialBold';
        }
        .showcase-platform-text {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.88em;
        }
        #showcase {
            transition: opacity 0.6s ease;
        }
        #showcase.fading { opacity: 0; }
        #showcase-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 0 0 10px 0;
            position: relative;
            z-index: 10;
        }
        .showcase-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0;
            position: relative;
        }
        .showcase-dot:hover { background: rgba(255,255,255,0.5); }
        .showcase-dot.active {
            background: var(--accent);
            transform: scale(1.3);
        }
        .showcase-dot.active::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid rgba(var(--accent-rgb), 0.4);
        }

        /* ===== SECTIONS & GRID ===== */
        h2 { padding-left: 40px;padding-top: 20px; margin-block-end: 0; font-family: 'OumaTrialBold'; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px; padding: 20px 40px; max-width: 2000px; margin: 0 auto;
        }
        .poster {
            cursor: pointer; border-radius: 0; overflow: hidden;
            box-shadow: 0 2px 12px #000a; transition: transform 0.15s;
            background: #111; position: relative;
            display: flex;
            flex-direction: column;
        }
        .poster:hover { transform: scale(1.04); }
        .poster img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
        .poster .poster-info {
            position: static;
            background: #0d0d0d;
            padding: 10px 10px 12px;
            font-size: 0.85em;
            min-height: 82px;
        }
        .poster .poster-title {
            font-family: 'OumaTrialBold'; font-size: 0.95em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .poster .poster-meta {
            color: #d0d0d0;
            font-size: 0.75em;
            margin-top: 5px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .poster .poster-pill {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px;
            padding: 2px 7px;
        }
        .poster .poster-label {
            background: var(--accent); color: #fff; font-size: 0.7em;
            padding: 2px 8px; border-radius: 3px; font-family: 'OumaTrialBold';
        }
        .poster .poster-badges-left,
        .poster .poster-badges-right {
            position: absolute;
            top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2;
        }
        .poster .poster-badges-left { left: 8px; }
        .poster .poster-badges-right { right: 8px; align-items: flex-end; }
        .poster .poster-watchlater-btn,
        .poster .poster-state-badge {
            border: none;
            border-radius: 999px;
            padding: 4px 9px;
            font-size: 0.68em;
            font-family: 'OumaTrialBold';
            letter-spacing: 0.04em;
        }
        .poster .poster-watchlater-btn {
            background: rgba(0,0,0,0.72);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
            cursor: pointer;
            transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
            width: 34px;
            height: 34px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }
        .poster:hover .poster-watchlater-btn { opacity: 1; pointer-events: auto; }
        .poster .poster-watchlater-btn:hover,
        .poster .poster-watchlater-btn.is-active {
            background: rgba(var(--accent-rgb), 0.16);
            border-color: rgba(var(--accent-rgb), 0.55);
            color: var(--accent);
        }
        .poster .poster-watchlater-btn .icon {
            font-size: 1rem;
            line-height: 1;
        }
        .poster .poster-state-badge {
            background: rgba(12, 12, 12, 0.9);
            color: #d8d8d8;
            border: 1px solid rgba(255,255,255,0.14);
        }
        .poster .poster-state-badge.is-finished {
            color: #fff;
            background: rgba(var(--accent-rgb), 0.22);
            border-color: rgba(var(--accent-rgb), 0.5);
        }

        /* ===== DRAMA DETAIL MODAL ===== */
        #detail-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.92);
            z-index: 200; overflow-y: auto;
        }
        #detail-content {
            max-width: 900px; margin: 40px auto; padding: 0 20px;
        }
        #detail-close {
            position: fixed; top: 20px; right: 30px;
            font-size: 2.5em; color: #fff; cursor: pointer; z-index: 210;
            background: none; border: none; line-height: 1;
        }
        #detail-close:hover { color: var(--accent); }
        .detail-header {
            display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .detail-thumb {
            width: 100%; max-width: 400px; border-radius: 4px;
            aspect-ratio: 16/9; object-fit: cover;
        }
        .detail-info { flex: 1; min-width: 250px; }
        .detail-title { font-family: 'OumaTrialBold'; font-size: 1.8em; margin-bottom: 8px; }
        .detail-meta { color: #aaa; margin-bottom: 12px; font-size: 0.95em; }
        .detail-meta span { margin-right: 16px; }
        .detail-desc { line-height: 1.6; color: #ccc; font-size: 0.95em; margin-bottom: 20px; }
        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .detail-action-btn {
            background: #111;
            color: #fff;
            border: 1px solid #242424;
            border-radius: 999px;
            padding: 10px 16px;
            font-family: 'OumaTrialBold';
            font-size: 0.92rem;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }
        .detail-action-btn:hover,
        .detail-action-btn.is-active {
            background: rgba(var(--accent-rgb), 0.14);
            border-color: rgba(var(--accent-rgb), 0.55);
            color: var(--accent);
        }

        /* ===== PLAYER MODAL ===== */
        #player-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 300;
        }
        #player-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; height: 85%;
        }
        #player-content iframe { width: 100%; height: 100%; border: none; }
        #close-player {
            position: absolute; top: 15px; right: 25px;
            font-size: 2.5em; color: white; cursor: pointer; z-index: 310;
        }
        #close-player:hover { color: var(--accent); }

        /* ===== CONTINUE WATCHING ===== */
        .continue-progress {
            width: 100%; height: 4px; background: #222; margin-top: 0;
            overflow: hidden; position: absolute; bottom: 0;
        }
        .continue-progress-bar { height: 100%; background: var(--accent); }

        /* ===== LOAD MORE ===== */
        .load-more-container { text-align: center; padding: 10px 0 30px; }
        .load-more-btn {
            background: #111; color: #fff; border: 1px solid #222;
            padding: 10px 32px; border-radius: 4px; cursor: pointer;
            font-family: 'OumaTrialLight'; font-size: 1em; transition: all 0.2s;
        }
        .load-more-btn:hover { background: var(--accent); border-color: var(--accent); }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; background: transparent; }

    <script>
    /* ========================================================

    const API_BASE = 'https://kisskh.ovh/api/DramaList';

    const FINISHED_KEY_PREFIX = 'kisskh_finished_';

    // ── State ──
    let currentFilter = 'home';

    let filteredLoading = false;

    let searchTimeout = null;

        year: '',
        status: '',
        type: '',
        sort: 'relevance',

    // ── Filter configs: { type, sub, country, status, order } ──

        kdrama:    { type: 0, sub: 0, country: 2, status: 0, order: 1 },

        hollywood: { type: 4, sub: 0, country: 0, status: 0, order: 1 },
        anime:     { type: 3, sub: 0, country: 0, status: 0, order: 1 },

    };

    const HOME_SECTION_PAGE_SIZE = 20;
    const HOME_SECTIONS = [
        { sectionId: 'latestSection', gridId: 'latestGrid', params: { type: 0, sub: 0, country: 0, status: 0, order: 2, pageSize: HOME_SECTION_PAGE_SIZE, page: 0 } },
        { sectionId: 'kdramaSection', gridId: 'kdramaGrid', params: { type: 0, sub: 0, country: 2, status: 0, order: 1, pageSize: HOME_SECTION_PAGE_SIZE, page: 0 } },
        { sectionId: 'cdramaSection', gridId: 'cdramaGrid', params: { type: 0, sub: 0, country: 3, status: 0, order: 1, pageSize: HOME_SECTION_PAGE_SIZE, page: 0 } },
        { sectionId: 'hollywoodSection', gridId: 'hollywoodGrid', params: { type: 4, sub: 0, country: 0, status: 0, order: 1, pageSize: HOME_SECTION_PAGE_SIZE, page: 0 } },
        { sectionId: 'animeSection', gridId: 'animeGrid', params: { type: 3, sub: 0, country: 0, status: 0, order: 1, pageSize: HOME_SECTION_PAGE_SIZE, page: 0 } },
    ];

    const SEARCH_CATALOG_PAGE_SIZE = 80;
    const SEARCH_SOURCE_CONFIGS = [
        { key: 'drama-all', params: { type: 0, sub: 0, country: 0, status: 0, order: 1 } },
        { key: 'kdrama', params: FILTER_CONFIG.kdrama },
        { key: 'cdrama', params: FILTER_CONFIG.cdrama },
        { key: 'hollywood', params: FILTER_CONFIG.hollywood },
        { key: 'anime', params: FILTER_CONFIG.anime },
        { key: 'movies', params: FILTER_CONFIG.movies },
    ];

    const SECTION_NAV_CONFIG = [
        { label: 'Continue Watching', targetId: 'continueSection' },
        { label: 'Watch Later', targetId: 'watchLaterSection' },
        { label: 'Finished', targetId: 'finishedSection' },
        { label: 'Latest Update', targetId: 'latestSection' },
        { label: 'Top K-Drama', targetId: 'kdramaSection' },
        { label: 'Top C-Drama', targetId: 'cdramaSection' },
        { label: 'Hollywood', targetId: 'hollywoodSection' },
        { label: 'Anime', targetId: 'animeSection' },
    ];

    const SHOWCASE_ROTATE_INTERVAL_MS = 10000;
    const HOME_SECTION_OBSERVER_MARGIN = '500px';

    function serializeQueryParams(params) {
        return new URLSearchParams(
            Object.entries(params).map(([key, value]) => [key, String(value)])
        ).toString();
    }

    function buildListEndpoint(params) {
        return `/List?${serializeQueryParams(params)}`;
    }

    async function fetchCatalogListPage(baseParams, page, pageSize) {
        return kisskh(buildListEndpoint({ ...baseParams, pageSize, page }));
    }

    function hasActiveAdvancedSearchFilters() {
        return _searchFilters.tag !== 'all'
            || Boolean(_searchFilters.country)
            || Boolean(_searchFilters.year)
            || Boolean(_searchFilters.status)
            || Boolean(_searchFilters.type)
            || _searchFilters.sort !== 'relevance';
    }

    function hasSearchConstraints(query) {
        return query.length >= 2 || hasActiveAdvancedSearchFilters();
    }

    // ── CORS proxy ──
    const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    // ── Userscript API Bridge (GM_xmlhttpRequest) ──
    // On production, the ateaish_drama_helpers userscript acts as a CORS-free
    // API bridge via postMessage. No public proxies needed.
    let _apiBridgeReady = false;
    let _bridgeReadyResolve = null;
    const _bridgeReadyPromise = new Promise(r => { _bridgeReadyResolve = r; });
    let _bridgeRequestId = 0;
    const _bridgePending = new Map();  // id → { resolve, reject }

    // Listen for bridge messages from the userscript
    window.addEventListener('message', (e) => {
        if (!e.data || e.data.source !== 'ateaish-drama-api') return;

        if (e.data.type === 'ready') {
            const wasReady = _apiBridgeReady;
            _apiBridgeReady = true;
            _preferSnapshot = false;
            _bridgeReadyResolve(true);
            console.log('[drama] API bridge connected');

            // If bridge arrived after initial load failed, retry home
            if (!wasReady && _homeLoadAttempted) {
                console.log('[drama] Late bridge — reloading home sections');
                loadHome();
                initShowcase();

                const searchInput = document.getElementById('search-input');
                const activeQuery = searchInput ? searchInput.value.trim() : '';
                if (hasSearchConstraints(activeQuery)) {
                    console.log('[drama] Late bridge — retrying live search');
                    performSearch(activeQuery);
                }
            }
            return;
        }

        if (e.data.type === 'response') {
            const pending = _bridgePending.get(e.data.id);
            if (!pending) return;
            _bridgePending.delete(e.data.id);

            if (e.data.error || !e.data.status || e.data.status >= 400) {
                pending.reject(new Error(`Bridge request failed (HTTP ${e.data.status})`));
            } else {
                try {
                    pending.resolve(JSON.parse(e.data.body));
                } catch (err) {
                    pending.reject(new Error('Bridge response parse error'));
                }
            }
        }
    });

    // Wait for bridge with timeout (only used on production)
    async function waitForBridge(timeoutMs = 2000) {
        if (_apiBridgeReady) return true;
        if (IS_LOCAL) return false;  // localhost uses local proxy, skip waiting
        const timeout = new Promise(r => setTimeout(() => r(false), timeoutMs));
        return Promise.race([_bridgeReadyPromise, timeout]);
    }

    // Fetch a URL through the userscript bridge
    function fetchViaBridge(url) {
        return new Promise((resolve, reject) => {
            const id = ++_bridgeRequestId;
            const timer = setTimeout(() => {
                _bridgePending.delete(id);
                reject(new Error('Bridge request timeout'));
            }, 15000);

            _bridgePending.set(id, {
                resolve: (val) => { clearTimeout(timer); resolve(val); },
                reject:  (err) => { clearTimeout(timer); reject(err); },
            });

            window.postMessage({
                source: 'ateaish-drama-api',
                type: 'request',
                id: id,
                url: url,
            }, '*');
        });
    }

    // Fallback proxies (local dev only; production uses bridge)
    const LOCAL_PROXY = (url) => `${location.protocol}//${location.host}/proxy?url=${encodeURIComponent(url)}`;

    function normalizeSnapshotItem(item) {
        return {
            id: item.id,
            title: item.title || '',
            thumbnail: item.thumbnail || '',
            episodesCount: item.episodesCount || 0,
            label: item.label || '',
            country: item.country || '',
            status: item.status || '',
            type: item.type || '',
            releaseDate: item.releaseDate || '',
            year: item.year || '',
            genres: Array.isArray(item.genres) ? item.genres : [],
        };
    }

    function sameFilter(params, expected) {
        return ['type', 'sub', 'country', 'status', 'order'].every(key => Number(params.get(key) || 0) === Number(expected[key] || 0));
    }

    function resolveSnapshotListKey(params) {
        if (sameFilter(params, HOME_SECTIONS[0].params)) return 'latest';
        for (const [key, config] of Object.entries(FILTER_CONFIG)) {
            if (sameFilter(params, config)) return key;
        }
        return null;
    }

    async function ensureSnapshotLoaded() {
        if (_snapshotCache) return _snapshotCache;
        if (_snapshotPromise) return _snapshotPromise;

        _snapshotPromise = fetch(SNAPSHOT_URL, { cache: 'no-store' })
            .then(async res => {
                if (!res.ok) throw new Error(`Snapshot HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                _snapshotCache = data;
                return data;
            })
            .finally(() => {
                _snapshotPromise = null;
            });

        return _snapshotPromise;
    }

    function getSnapshotSearchEntries(snapshot) {
        if (_snapshotSearchEntries) return _snapshotSearchEntries;

        _snapshotSearchEntries = Object.values(snapshot.items || {})
            .map(normalizeSnapshotItem)
            .filter(item => item.id)
            .map(item => {
                const detail = (snapshot.details && snapshot.details[String(item.id)]) || {};
                const description = detail.description || '';
                const country = detail.country || item.country || '';
                const status = detail.status || item.status || '';
                const type = detail.type || item.type || '';
                const releaseDate = detail.releaseDate || item.releaseDate || '';
                const year = detail.year || item.year || (releaseDate && /^\d{4}/.test(releaseDate) ? releaseDate.slice(0, 4) : '');
                const genres = Array.isArray(detail.genres) && detail.genres.length ? detail.genres : item.genres;
                const searchText = [item.title, description, country, status, type, ...(genres || [])].join(' ').toLowerCase();

                return {
                    ...item,
                    description,
                    country,
                    status,
                    type,
                    releaseDate,
                    year,
                    genres: genres || [],
                    searchText,
                };
            });

        return _snapshotSearchEntries;
    }

    function populateSelectOptions(selectId, values, placeholder) {
        const select = document.getElementById(selectId);
        if (!select) return;
        const currentValue = select.value;
        select.innerHTML = '';
        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = placeholder;
        select.appendChild(defaultOption);

        values.forEach(value => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
        });

        if (currentValue && values.includes(currentValue)) {
            select.value = currentValue;
        }
    }

    async function populateSearchFilters() {
        if (_searchFiltersReady) return;
        const snapshot = await ensureSnapshotLoaded();
        const facets = snapshot.facets || {};
        const entries = getSnapshotSearchEntries(snapshot);

        const countries = facets.countries || [...new Set(entries.map(item => item.country).filter(Boolean))].sort();
        const years = facets.years || [...new Set(entries.map(item => item.year).filter(Boolean))].sort((a, b) => b.localeCompare(a));
        const statuses = facets.statuses || [...new Set(entries.map(item => item.status).filter(Boolean))].sort();
        const types = facets.types || [...new Set(entries.map(item => item.type).filter(Boolean))].sort();

        populateSelectOptions('search-country-filter', countries, 'Any Country');
        populateSelectOptions('search-year-filter', years, 'Any Year');
        populateSelectOptions('search-status-filter', statuses, 'Any Status');
        populateSelectOptions('search-type-filter', types, 'Any Type');

        _searchFiltersReady = true;
    }

    function computeSearchScore(entry, queryTerms) {
        if (!queryTerms.length) return 0;
        const title = entry.title.toLowerCase();
        let score = 0;
        queryTerms.forEach(term => {
            if (title === term) score += 160;
            else if (title.startsWith(term)) score += 100;
            else if (title.includes(term)) score += 60;
            if (entry.searchText.includes(term)) score += 20;
            if ((entry.description || '').toLowerCase().includes(term)) score += 8;
        });
        return score;
    }

    function enrichSearchEntry(entry) {
        const base = normalizeSnapshotItem(entry);
        const snapshotData = getSnapshotDramaData(base.id) || {};
        const detail = snapshotData.detail || {};
        const item = snapshotData.item || {};

        const description = entry.description || detail.description || '';
        const country = entry.country || detail.country || item.country || '';
        const status = entry.status || detail.status || item.status || '';
        const type = entry.type || detail.type || item.type || '';
        const releaseDate = entry.releaseDate || detail.releaseDate || item.releaseDate || '';
        const year = entry.year || detail.year || item.year || (releaseDate && /^\d{4}/.test(releaseDate) ? releaseDate.slice(0, 4) : '');
        const genres = Array.isArray(entry.genres) && entry.genres.length
            ? entry.genres
            : (Array.isArray(detail.genres) && detail.genres.length ? detail.genres : (item.genres || []));

        return {
            ...base,
            description,
            country,
            status,
            type,
            releaseDate,
            year,
            genres,
            searchText: [base.title, description, country, status, type, ...genres].join(' ').toLowerCase(),
        };
    }

    function applySearchFilters(entries, queryTerms) {
        let results = entries.filter(entry => {
            if (_searchFilters.tag !== 'all' && !(entry.genres || []).includes(_searchFilters.tag)) return false;
            if (_searchFilters.country && entry.country !== _searchFilters.country) return false;
            if (_searchFilters.year && entry.year !== _searchFilters.year) return false;
            if (_searchFilters.status && entry.status !== _searchFilters.status) return false;
            if (_searchFilters.type && entry.type !== _searchFilters.type) return false;
            if (queryTerms.length && !queryTerms.every(term => (entry.searchText || '').includes(term))) return false;
            return true;
        }).map(entry => ({ ...entry, _score: computeSearchScore(entry, queryTerms) }));

        switch (_searchFilters.sort) {
            case 'newest':
                results.sort((a, b) => (b.releaseDate || '').localeCompare(a.releaseDate || '') || a.title.localeCompare(b.title));
                break;
            case 'oldest':
                results.sort((a, b) => (a.releaseDate || '').localeCompare(b.releaseDate || '') || a.title.localeCompare(b.title));
                break;
            case 'az':
                results.sort((a, b) => a.title.localeCompare(b.title));
                break;
            default:
                results.sort((a, b) => (b._score - a._score) || (b.releaseDate || '').localeCompare(a.releaseDate || '') || a.title.localeCompare(b.title));
                break;
        }

        return results;
    }

    async function searchSnapshotCatalog(query) {
        const snapshot = await ensureSnapshotLoaded();
        const queryTerms = query.toLowerCase().split(/\s+/).filter(Boolean);
        const entries = getSnapshotSearchEntries(snapshot);
        return applySearchFilters(entries, queryTerms);
    }

    async function buildLiveCatalogEntries(onProgress) {
        const unique = new Map();

        for (const source of SEARCH_SOURCE_CONFIGS) {
            let page = 0;
            let totalCount = Infinity;

            while (page * SEARCH_CATALOG_PAGE_SIZE < totalCount) {
                if (onProgress) {
                    onProgress(`Indexing full live catalog: ${unique.size} titles cached`);
                }

                const data = await fetchCatalogListPage(source.params, page, SEARCH_CATALOG_PAGE_SIZE);
                const items = Array.isArray(data.data) ? data.data : [];

                items.forEach(item => {
                    if (!item || !item.id || unique.has(item.id)) return;
                    unique.set(item.id, enrichSearchEntry(item));
                });

                const reportedTotal = Number(data.totalCount || 0);
                totalCount = reportedTotal > 0 ? reportedTotal : items.length;
                page += 1;

                if (!items.length || items.length < SEARCH_CATALOG_PAGE_SIZE) break;
            }
        }

        if (onProgress) {
            onProgress(`Indexed ${unique.size} live titles`);
        }

        return Array.from(unique.values());
    }

    async function ensureLiveCatalogEntries(onProgress) {
        if (_liveCatalogEntries) return _liveCatalogEntries;

        if (!_liveCatalogPromise) {
            _liveCatalogPromise = buildLiveCatalogEntries(onProgress)
                .then(entries => {
                    _liveCatalogEntries = entries;
                    return entries;
                })
                .finally(() => {
                    _liveCatalogPromise = null;
                });
        } else if (onProgress) {
            onProgress('Indexing full live catalog...');
        }

        return _liveCatalogPromise;
    }

    async function searchLiveCatalog(query, onProgress) {
        const queryTerms = query.toLowerCase().split(/\s+/).filter(Boolean);
        const entries = await ensureLiveCatalogEntries(onProgress);
        return applySearchFilters(entries, queryTerms);

    async function snapshotKisskh(endpoint) {
        const snapshot = await ensureSnapshotLoaded();
        const parsed = new URL(endpoint, 'https://snapshot.local');

        if (parsed.pathname === '/List') {
            const key = resolveSnapshotListKey(parsed.searchParams);
            if (!key) throw new Error(`Snapshot does not support ${endpoint}`);

            const sourceIds = key === 'latest' ? snapshot.sections.latest : snapshot.filters[key];
            const pageSize = Number(parsed.searchParams.get('pageSize') || snapshot.pageSize || 40);
            const page = Number(parsed.searchParams.get('page') || 0);
            const start = page * pageSize;
            const data = getSnapshotItems(sourceIds.slice(start, start + pageSize), snapshot);

            return {
                page: page + 1,
                pageSize,
                totalCount: sourceIds.length,
                data,
            };
        }

        if (parsed.pathname === '/Search') {
            const query = (parsed.searchParams.get('q') || '').trim().toLowerCase();
            if (!query) return [];
            const results = Object.values(snapshot.items || {})
                .map(normalizeSnapshotItem)
                .filter(item => item.title.toLowerCase().includes(query))
                .slice(0, 80);
            return results;
        }

        if (parsed.pathname.startsWith('/Drama/')) {
            const dramaId = parsed.pathname.split('/').pop();
            const detail = snapshot.details && snapshot.details[String(dramaId)];
            if (!detail) throw new Error(`Snapshot detail missing for ${dramaId}`);
            return detail;
        }

        throw new Error(`Snapshot does not support ${endpoint}`);
    }

    // ── API fetch helper ──
    async function kisskh(endpoint) {
        const url = `${API_BASE}${endpoint}`;

        if (_preferSnapshot) {
            try {
                return await snapshotKisskh(endpoint);
            } catch (e) {
                console.warn('[drama] Snapshot fetch failed:', e.message);
            }
        }

        // Try direct first (works if same-origin or CORS allowed)
        try {
            const res = await fetch(url);
            if (res.ok) return res.json();
        } catch (e) { /* CORS blocked – fall through */ }

        // Try userscript bridge (production)
        if (_apiBridgeReady) {
            try {
                return await fetchViaBridge(url);
            } catch (e) { console.warn('[drama] Bridge fetch failed:', e.message); }
        }

        // Try local proxy (dev)
        if (IS_LOCAL) {
            try {
                const res = await fetch(LOCAL_PROXY(url));
                if (res.ok) return res.json();
            } catch (e) { /* local proxy failed */ }
        }

        if (!_preferSnapshot) {
            try {
                return await snapshotKisskh(endpoint);
            } catch (e) {
                console.warn('[drama] Snapshot fallback failed:', e.message);
            }
        }

        throw new Error(`All fetch attempts failed for ${endpoint}`);
    }

    function slugify(title) {
        return title.replace(/[^a-zA-Z0-9\s-]/g, '').replace(/\s+/g, '-');

    // ── Truncate text ──
    function truncate(text, max = 120) {
        if (!text) return '';
        return text.length > max ? text.slice(0, max).trim() + '...' : text;
    }

    function truncateOverview(text, maxLength = 250) {
        if (!text) return '';
        return text.length > maxLength ? `${text.slice(0, maxLength).trim()}...` : text;
    }

    function getTmdbSearchTitle(value) {
        return String(value || '')
            .replace(/\((?:19|20)\d{2}\)/gi, '')
            .replace(/\((?:season|series|part|vol(?:ume)?)\s*[^)]*\)/gi, '')
            .replace(/\[(?:season|series|part|vol(?:ume)?)\s*[^\]]*\]/gi, '')
            .replace(/\b(?:season|series|part|vol(?:ume)?)\s*\d+\b/gi, '')
            .replace(/\bs\d+\b/gi, '')
            .replace(/\s{2,}/g, ' ')
            .trim();
    }

    function normalizeTitleForTmdb(value) {
        return getTmdbSearchTitle(value)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, ' ')
            .trim();
    }

    async function fetchTmdbShowcaseAssets(title, year = '') {
        const normalizedTitle = normalizeTitleForTmdb(title);
        if (!normalizedTitle) return null;

        const cacheKey = `${normalizedTitle}|${year || ''}`;
        if (_tmdbAssetCache.has(cacheKey)) return _tmdbAssetCache.get(cacheKey);

        const pending = (async () => {
            const searchTitle = getTmdbSearchTitle(title) || title;
            const searchUrl = `${TMDB_SEARCH_MULTI_ENDPOINT}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(searchTitle)}`;
            const searchResponse = await fetch(searchUrl);
            if (!searchResponse.ok) throw new Error(`TMDB search HTTP ${searchResponse.status}`);
            const searchPayload = await searchResponse.json();
            const results = Array.isArray(searchPayload.results) ? searchPayload.results : [];

            const ranked = results
                .filter(item => item && item.id && (item.media_type === 'tv' || item.media_type === 'movie'))
                .map(item => {
                    const itemTitle = item.title || item.name || '';
                    const itemYear = (item.first_air_date || item.release_date || '').slice(0, 4);
                    const normalizedItemTitle = normalizeTitleForTmdb(itemTitle);
                    let score = 0;
                    if (normalizedItemTitle === normalizedTitle) score += 120;
                    else if (normalizedItemTitle.includes(normalizedTitle)) score += 80;
                    else if (normalizedTitle.includes(normalizedItemTitle)) score += 60;
                    if (year && itemYear === String(year)) score += 30;
                    if (item.media_type === 'tv') score += 10;
                    return { item, score };
                })
                .sort((a, b) => b.score - a.score);

            const best = ranked[0] && ranked[0].score >= 60 ? ranked[0].item : null;
            if (!best) return { logoUrl: null, backdropUrl: null };

            const imageType = best.media_type === 'movie' ? 'movie' : 'tv';
            const imagesUrl = `https://api.themoviedb.org/3/${imageType}/${best.id}/images?api_key=${TMDB_API_KEY}&include_image_language=en,null`;
            const imagesResponse = await fetch(imagesUrl);
            const imagesPayload = imagesResponse.ok ? await imagesResponse.json() : {};
            const logos = Array.isArray(imagesPayload.logos) ? imagesPayload.logos : [];
            const englishLogos = logos.filter(logo => logo.iso_639_1 === 'en');
            const chosenLogo = englishLogos[0] || logos[0] || null;
            const logoUrl = chosenLogo && chosenLogo.file_path
                ? `https://image.tmdb.org/t/p/original${chosenLogo.file_path}`
                : null;
            const backdropUrl = best.backdrop_path
                ? `https://image.tmdb.org/t/p/original${best.backdrop_path}`
                : null;

            return {
                logoUrl,
                backdropUrl,
                tmdbId: best.id,
                mediaType: imageType,
            };
        })().catch(err => {
            console.warn('[drama] TMDB asset lookup failed:', err.message);
            return null;
        });

        _tmdbAssetCache.set(cacheKey, pending);
        return pending;
    }

    function readStoredDrama(key) {
        try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : null;
        } catch (err) {

    function collectStoredDramas(prefix) {
        const items = [];
        for (let index = 0; index < localStorage.length; index++) {
            const key = localStorage.key(index);
            if (!key || !key.startsWith(prefix)) continue;
            const item = readStoredDrama(key);
            if (item && item.id) items.push(item);
        }
        return items;
    }

    // ── Show hover preview ──
    function showPreview(posterDiv, drama) {
        const preview = document.getElementById('posterPreview');
        preview.innerHTML = `
            <img src="${drama.thumbnail}" alt="${drama.title}">
            <div class="preview-title">${drama.title}</div>
            <div class="preview-meta">EP ${drama.episodesCount || '?'}${drama.label ? ' · ' + drama.label : ''}</div>
        `;
        preview.style.display = 'block';
        preview.style.opacity = '1';

        requestAnimationFrame(() => {
            const rect = posterDiv.getBoundingClientRect();
            const previewRect = preview.getBoundingClientRect();
            const scrollX = window.scrollX;
            const scrollY = window.scrollY;
            const margin = 8;

            let left = rect.left + scrollX + (rect.width / 2) - (previewRect.width / 2);
            let top = rect.top + scrollY - previewRect.height - margin;

            left = Math.max(scrollX + margin, left);
            left = Math.min(scrollX + window.innerWidth - previewRect.width - margin, left);
            top = Math.max(scrollY + margin, top);

            preview.style.left = `${left}px`;
            preview.style.top = `${top}px`;
        });
    }

    function hidePreview() {
        const preview = document.getElementById('posterPreview');
        preview.style.display = 'none';
        preview.style.opacity = '0';
    }

    // ── Load skeletons ──
    function loadSkeletons(grid, count = 10) {
        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            div.className = 'skeleton';
            grid.appendChild(div);
        }
    }

    // ── Load a grid section ──
    async function loadSection(gridId, params, options = {}) {
        const grid = document.getElementById(gridId);
        if (!grid) return;

        const { append = false, placeholderCount = 10 } = options;

        if (!append) {
            grid.innerHTML = '';
            if (placeholderCount > 0) loadSkeletons(grid, placeholderCount);
        }

        try {
            const data = await kisskh(buildListEndpoint(params));
            const items = Array.isArray(data.data) ? data.data : [];
            const fragment = document.createDocumentFragment();

            if (!append) grid.innerHTML = '';

            items.forEach(drama => {
                fragment.appendChild(createPosterCard(drama, gridId));
            });

            grid.appendChild(fragment);

            return {
                items,
                totalCount: Number(data.totalCount || items.length),
                pageSize: Number(data.pageSize || params.pageSize || items.length),
            };
        } catch (err) {
            console.error(`Failed to load ${gridId}:`, err);
            if (!append) {
                grid.innerHTML = '<p style="color:#555;padding:20px;">Failed to load. Check connection.</p>';
            }
            throw err;
        }
    }

    function extractShowcaseData(drama, detail = null) {
        const snapshotData = getSnapshotDramaData(drama.id);
        const snapshotItem = snapshotData ? snapshotData.item : null;
        const snapshotDetail = snapshotData ? snapshotData.detail : null;
        const resolvedDetail = detail || snapshotDetail || null;
        const releaseDate = drama.releaseDate || (resolvedDetail && resolvedDetail.releaseDate) || (snapshotItem && snapshotItem.releaseDate) || '';
        const year = drama.year || (resolvedDetail && resolvedDetail.year) || (snapshotItem && snapshotItem.year) || (/^\d{4}/.test(releaseDate) ? releaseDate.slice(0, 4) : '');
        const country = drama.country || (resolvedDetail && resolvedDetail.country) || (snapshotItem && snapshotItem.country) || '';
        const type = drama.type || (resolvedDetail && resolvedDetail.type) || (snapshotItem && snapshotItem.type) || '';
        const status = drama.status || (resolvedDetail && resolvedDetail.status) || (snapshotItem && snapshotItem.status) || drama.label || '';
        const description = (resolvedDetail && resolvedDetail.description) || drama.description || '';
        const genres = Array.isArray(resolvedDetail && resolvedDetail.genres)
            ? resolvedDetail.genres
            : (Array.isArray(drama.genres) && drama.genres.length ? drama.genres : ((snapshotItem && snapshotItem.genres) || []));

        return {
            id: drama.id,
            title: drama.title || '',
            thumbnail: drama.thumbnail || (resolvedDetail && resolvedDetail.thumbnail) || '',
            year,
            country,
            type,
            status,
            description,
            genres: genres || [],
            episodesCount: drama.episodesCount || (resolvedDetail && resolvedDetail.episodesCount) || 0,
        };
    }

    async function hydrateShowcaseDrama(drama) {
        if (_showcaseHydrated.has(drama.id)) return _showcaseHydrated.get(drama.id);

        let featured = extractShowcaseData(drama);
        if (!featured.description || !featured.country || !featured.type || !featured.status || !featured.genres.length) {
            try {
                const detail = await kisskh(`/Drama/${drama.id}?is498=false`);
                featured = extractShowcaseData({ ...drama, ...detail }, detail);
            } catch (err) {
                // Snapshot/base data remains the fallback.
            }
        }

        _showcaseHydrated.set(drama.id, featured);
        return featured;
    }

    async function loadShowcaseCandidates() {
        const requests = [
            { type: 0, sub: 0, country: 0, status: 0, order: 2, pageSize: 8, page: 0 },
            { type: 0, sub: 0, country: 2, status: 0, order: 1, pageSize: 6, page: 0 },
            { type: 0, sub: 0, country: 3, status: 0, order: 1, pageSize: 6, page: 0 },
        ];

        const results = await Promise.allSettled(requests.map(async params => {
            const qs = Object.entries(params).map(([key, value]) => `${key}=${value}`).join('&');
            const data = await kisskh(`/List?${qs}`);
            return data.data || [];
        }));

        const unique = new Map();
        results.forEach(result => {
            if (result.status !== 'fulfilled') return;
            result.value.forEach(item => {
                if (item && item.id && !unique.has(item.id)) unique.set(item.id, item);
            });
        });

        return Array.from(unique.values()).slice(0, 8);
    }

    function buildShowcaseDots() {
        const dotsContainer = document.getElementById('showcase-dots');
        if (!dotsContainer) return;
        dotsContainer.innerHTML = '';

        _showcaseCandidates.forEach((_, index) => {
            const dot = document.createElement('button');
            dot.className = `showcase-dot${index === _showcaseCurrentIndex ? ' active' : ''}`;
            dot.setAttribute('aria-label', `Featured title ${index + 1}`);
            dot.type = 'button';
            dot.addEventListener('click', () => {
                goToShowcaseSlide(index, true);
                resetShowcaseRotation();
            });
            dotsContainer.appendChild(dot);
        });
    }

    function updateShowcaseDots(index) {
        const dotsContainer = document.getElementById('showcase-dots');
        if (!dotsContainer) return;
        dotsContainer.querySelectorAll('.showcase-dot').forEach((dot, dotIndex) => {
            dot.classList.toggle('active', dotIndex === index);
        });
    }

    function renderShowcase(featured) {
        const showcaseSection = document.getElementById('showcaseSection');
        const showcase = document.getElementById('showcase');
        const heroWrapper = document.getElementById('hero-wrapper');
        const logoWrapper = document.querySelector('.showcase-logo-wrapper');
        const titleEl = document.getElementById('showcase-title');
        const yearEl = document.getElementById('showcase-year');
        const ratingEl = document.getElementById('showcase-rating');
        const runtimeEl = document.getElementById('showcase-runtime');
        const overviewEl = document.getElementById('showcase-overview');
        const platformEl = document.getElementById('showcase-platform');
        const tagsEl = document.getElementById('showcase-tags');
        const playBtn = document.getElementById('play-featured');
        const moreBtn = document.getElementById('showcase-more');

        if (!showcaseSection || !showcase || !logoWrapper || !titleEl || !yearEl || !ratingEl || !runtimeEl || !overviewEl || !platformEl || !tagsEl || !playBtn || !moreBtn) return;

        showcaseSection.hidden = false;
        const backdropUrl = featured.backdropUrl || featured.thumbnail || '';
        if (heroWrapper) {
            heroWrapper.style.backgroundImage = backdropUrl ? `url('${backdropUrl}')` : 'none';
            heroWrapper.classList.toggle('showcase-has-bg', Boolean(backdropUrl));
        }
        if (featured.logoUrl) {
            logoWrapper.innerHTML = `<img src="${featured.logoUrl}" alt="${featured.title}" loading="lazy">`;
        } else {
            logoWrapper.innerHTML = `
                <div style="
                    font-family: 'OumaTrialBold', sans-serif;
                    font-size: clamp(2.2em, 4.8vw, 3.6em);
                    letter-spacing: 2px;
                    text-transform: uppercase;
                    color: #ffffff;
                    text-shadow: 0 6px 18px rgba(0,0,0,0.9);
                    line-height: 1;
                    text-align: center;
                ">${featured.title}</div>
            `;
        }

        titleEl.textContent = featured.title;
        yearEl.textContent = featured.year || '';
        ratingEl.textContent = featured.country || '';
        runtimeEl.textContent = featured.type || '';
        platformEl.innerHTML = featured.status ? `<span class="showcase-platform-text">${featured.status}</span>` : '';
        overviewEl.textContent = truncateOverview(featured.description) || 'No description available.';
        overviewEl.classList.add('long');
        overviewEl.classList.remove('expanded');
        tagsEl.innerHTML = '';
        (featured.genres || []).slice(0, 5).forEach(tag => {
            const span = document.createElement('span');
            span.className = 'showcase-tag';
            span.textContent = tag;
            tagsEl.appendChild(span);
        });

        moreBtn.setAttribute('aria-expanded', 'false');
        moreBtn.textContent = 'Show More';
        moreBtn.onclick = (event) => {
            event.preventDefault();
            event.stopPropagation();
            openDetail(featured.id);
        };

        playBtn.textContent = 'Play';
        playBtn.onclick = (event) => {
            event.preventDefault();
            event.stopPropagation();
            const savedProgress = getSavedProgress(featured.id);
            const episode = savedProgress && savedProgress.episode ? savedProgress.episode : 1;
            const resumeTime = savedProgress && savedProgress.currentTime ? savedProgress.currentTime : null;
            openPlayer(featured.id, featured.title, episode, resumeTime);
            saveContinueWatching(featured.id, featured.title, featured.thumbnail, episode, featured.episodesCount || 0);
        };
    }

    async function goToShowcaseSlide(index, force = false) {
        if (!force && index === _showcaseCurrentIndex && _showcaseCandidates.length > 1) return;

        _showcaseCurrentIndex = index;
        const showcase = document.getElementById('showcase');
        if (!showcase) return;

        if (!force) {
            showcase.classList.add('fading');
            await new Promise(resolve => setTimeout(resolve, 600));
        }

        const featured = await hydrateShowcaseDrama(_showcaseCandidates[index]);
        if (!featured.logoUrl || !featured.backdropUrl) {
            const tmdbAssets = await fetchTmdbShowcaseAssets(featured.title, featured.year);
            if (tmdbAssets) {
                featured.logoUrl = featured.logoUrl || tmdbAssets.logoUrl || null;
                featured.backdropUrl = featured.backdropUrl || tmdbAssets.backdropUrl || null;
            }
            _showcaseHydrated.set(featured.id, featured);
        }
        renderShowcase(featured);
        updateShowcaseDots(index);
        showcase.classList.remove('fading');
    }

    function startShowcaseRotation() {
        if (_showcaseTimer || _showcaseCandidates.length < 2) return;
        _showcaseTimer = setInterval(() => {
            if (_showcasePaused) return;
            const next = (_showcaseCurrentIndex + 1) % _showcaseCandidates.length;
            goToShowcaseSlide(next);
        }, SHOWCASE_ROTATE_INTERVAL_MS);
    }

    function resetShowcaseRotation() {
        if (_showcaseTimer) {
            clearInterval(_showcaseTimer);
            _showcaseTimer = null;
        }
        startShowcaseRotation();
    }

    async function initShowcase() {
        const showcaseSection = document.getElementById('showcaseSection');
        const showcase = document.getElementById('showcase');
        if (!showcaseSection || !showcase) return;

        try {
            const candidates = await loadShowcaseCandidates();
            if (!candidates.length) {
                showcaseSection.hidden = true;
                return;
            }

            _showcaseCandidates = candidates;
            _showcaseCurrentIndex = Math.floor(Math.random() * _showcaseCandidates.length);
            await goToShowcaseSlide(_showcaseCurrentIndex, true);
            buildShowcaseDots();
            updateShowcaseDots(_showcaseCurrentIndex);
            resetShowcaseRotation();

            if (!showcase.dataset.carouselBound) {
                showcase.addEventListener('mouseenter', () => { _showcasePaused = true; });
                showcase.addEventListener('mouseleave', () => { _showcasePaused = false; });
                showcase.dataset.carouselBound = 'true';
            }
        } catch (err) {
            console.warn('[drama] Showcase init failed:', err.message);
            showcaseSection.hidden = true;
        }
    }

    // ── Load home view (lazy – only first section + continue watching load immediately) ──
    let _homeLoadAttempted = false;

    function ensureHomeFeedSentinel(sectionId, gridId) {
        const section = document.getElementById(sectionId);
        if (!section) return null;

        let sentinel = section.querySelector(`.home-feed-sentinel[data-grid-id="${gridId}"]`);
        if (!sentinel) {
            sentinel = document.createElement('div');
            sentinel.className = 'home-feed-sentinel';
            sentinel.dataset.gridId = gridId;
            section.appendChild(sentinel);
        }

        return sentinel;
    }

    function resetHomeSectionObservers() {
        if (_homeSectionObserver) {
            _homeSectionObserver.disconnect();
            _homeSectionObserver = null;
        }
        _homeSectionState.clear();
    }

    function getHomeSectionState(gridId) {
        if (_homeSectionState.has(gridId)) return _homeSectionState.get(gridId);

        const state = {
            initialized: false,
            loading: false,
            page: 0,
            loadedCount: 0,
            totalCount: 0,
            hasMore: true,
        };
        _homeSectionState.set(gridId, state);
        return state;
    }

    async function loadHomeSectionPage(sectionConfig, reset = false) {
        const state = getHomeSectionState(sectionConfig.gridId);
        if (state.loading || (!reset && !state.hasMore)) return;

        state.loading = true;
        const targetPage = reset ? 0 : state.page;

        try {
            const result = await loadSection(
                sectionConfig.gridId,
                { ...sectionConfig.params, page: targetPage },
                { append: targetPage > 0, placeholderCount: reset ? 6 : 0 }
            );

            const items = result && Array.isArray(result.items) ? result.items : [];
            const pageSize = Number(sectionConfig.params.pageSize || HOME_SECTION_PAGE_SIZE);

            state.initialized = true;
            state.page = targetPage + 1;
            state.loadedCount = targetPage === 0 ? items.length : state.loadedCount + items.length;
            state.totalCount = Number(result && result.totalCount ? result.totalCount : state.loadedCount);
            state.hasMore = items.length >= pageSize && state.loadedCount < state.totalCount;
        } catch (err) {
            state.hasMore = false;
        } finally {
            state.loading = false;
        }
    }

    function setupHomeSectionObserver() {
        _homeSectionObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;

                const gridId = entry.target.dataset.gridId;
                const sectionConfig = HOME_SECTIONS.find(section => section.gridId === gridId);
                if (!sectionConfig) return;

                const state = getHomeSectionState(gridId);
                loadHomeSectionPage(sectionConfig, !state.initialized);
            });
        }, { rootMargin: HOME_SECTION_OBSERVER_MARGIN });

        HOME_SECTIONS.forEach(sectionConfig => {
            const sentinel = ensureHomeFeedSentinel(sectionConfig.sectionId, sectionConfig.gridId);
            if (sentinel) _homeSectionObserver.observe(sentinel);
        });
    }

    function loadHome() {
        _homeLoadAttempted = true;
        loadContinueWatching();
        loadWatchLater();
        loadFinished();

        resetHomeSectionObservers();

        HOME_SECTIONS.forEach((sectionConfig, index) => {
            const grid = document.getElementById(sectionConfig.gridId);
            if (!grid) return;

            _homeSectionState.set(sectionConfig.gridId, {
                initialized: false,
                loading: false,
                page: 0,
                loadedCount: 0,
                totalCount: 0,
                hasMore: true,
            });

            grid.innerHTML = '';
            if (index > 0) loadSkeletons(grid, 6);
            ensureHomeFeedSentinel(sectionConfig.sectionId, sectionConfig.gridId);
        });

        setupHomeSectionObserver();

        // Load first section (Latest Update) right away
        if (HOME_SECTIONS.length > 0) {
            loadHomeSectionPage(HOME_SECTIONS[0], true);
        }
    }

    // ── Load filtered view ──
    async function loadFiltered(filter, reset = true) {
        if (filteredLoading) return;
        const config = FILTER_CONFIG[filter];
        if (!config) return;

        const grid = document.getElementById('filteredGrid');
        const loadBtn = document.getElementById('loadMoreBtn');

        if (reset) {
            filteredPage = 0;
            filteredHasMore = true;
            grid.innerHTML = '';
        }

        filteredLoading = true;
        loadBtn.textContent = 'Loading...';
        loadBtn.disabled = true;

        try {
            const qs = `type=${config.type}&sub=${config.sub}&country=${config.country}&status=${config.status}&order=${config.order}&pageSize=40&page=${filteredPage}`;
            const data = await kisskh(`/List?${qs}`);
            const items = data.data || [];
            items.forEach(drama => {
                grid.appendChild(createPosterCard(drama, 'filteredGrid'));
            });

            filteredPage++;
            filteredHasMore = items.length >= 40 && (filteredPage * 40) < data.totalCount;
            loadBtn.style.display = filteredHasMore ? 'inline-block' : 'none';
        } catch (err) {
            console.error('Failed to load filtered:', err);
            if (reset) grid.innerHTML = '<p style="color:#555;padding:20px;">Failed to load.</p>';
        }

        filteredLoading = false;
        loadBtn.textContent = 'Load More';
        loadBtn.disabled = false;
    }

    // ── Search ──
    async function performSearch(query) {
        const results = document.getElementById('search-results');
        const status = document.getElementById('search-results-status');
        const searchRequestId = ++_searchRequestSequence;

        const setStatusText = (message) => {
            if (searchRequestId !== _searchRequestSequence) return false;
            status.textContent = message;
            return true;
        };

        if (!hasSearchConstraints(query)) {
            results.innerHTML = '';
            status.textContent = '';
            return;
        }

        results.innerHTML = '<p style="color:#555;text-align:center;">Searching...</p>';
        setStatusText('');

        try {
            let items = [];
            const canUseLiveSearch = Boolean((_apiBridgeReady || IS_LOCAL) && hasSearchConstraints(query));

            if (canUseLiveSearch) {
                try {
                    items = await searchLiveCatalog(query, setStatusText);
                    if (searchRequestId !== _searchRequestSequence) return;
                    setStatusText(`Showing ${items.length} live result${items.length === 1 ? '' : 's'} from the full catalog`);
                } catch (err) {
                    console.warn('[drama] Full live search failed, using snapshot fallback:', err.message);
                    items = await searchSnapshotCatalog(query);
                    if (searchRequestId !== _searchRequestSequence) return;
                    setStatusText(`Live catalog unavailable, showing ${items.length} cached snapshot result${items.length === 1 ? '' : 's'}`);
                }
            } else {
                items = await searchSnapshotCatalog(query);
                if (searchRequestId !== _searchRequestSequence) return;
                setStatusText(`Showing ${items.length} cached snapshot result${items.length === 1 ? '' : 's'}`);
            }

            if (searchRequestId !== _searchRequestSequence) return;

            results.innerHTML = '';

            if (!items || items.length === 0) {
                results.innerHTML = '<p style="color:#555;text-align:center;">No results found.</p>';
                return;
            }

            const fragment = document.createDocumentFragment();
            items.forEach(drama => {
                fragment.appendChild(createPosterCard(drama, 'search-results'));
            });
            results.appendChild(fragment);
        } catch (err) {
            console.error('Search error:', err);
            if (searchRequestId !== _searchRequestSequence) return;
            results.innerHTML = '<p style="color:#555;text-align:center;">Search failed. Try again.</p>';
            setStatusText('');
        }
    }

    // ── Open drama detail ──
