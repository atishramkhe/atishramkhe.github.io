<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ateaish gaming</title>
    <link rel="icon" href="../favicon.png">
    <script defer src="../master-navigation.js"></script>
    <style>
        @font-face { font-family:'OumaTrialBold';  src:url('../fonts/OumaTrial-Bold.ttf')  format('truetype'); font-weight:700; font-style:normal; font-display:swap; }
        @font-face { font-family:'OumaTrialLight'; src:url('../fonts/OumaTrial-Light.ttf') format('truetype'); font-weight:300; font-style:normal; font-display:swap; }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #09090f;
            --bg2:       #111120;
            --bg3:       #1a1a2e;
            --card:      #111118;
            --card-h:    #1c1c2e;
            --accent:    #7c49ec;
            --accent2:   #a855f7;
            --gold:      #f4c54d;
            --new:       #22c55e;
            --updated:   #3b82f6;
            --text:      #e8e8ef;
            --text2:     #9999bb;
            --border:    #2a2a3e;
            --radius:    10px;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'OumaTrialLight', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            --ateaish-master-nav-accent: var(--accent);
            --ateaish-master-nav-accent-rgb: 124, 73, 236;
            --ateaish-master-nav-text: var(--text);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 80;
            background: rgba(9,9,15,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            height: 64px;
        }
        .logo {
            font-family: 'OumaTrialBold', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 1px;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        .logo span { color: var(--accent); }

        /* ── Search bar ── */
        .search-wrap {
            flex: 1;
            max-width: 520px;
            position: relative;
        }
        #search-input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 40px 9px 14px;
            font-size: 0.95rem;
            color: var(--text);
            font-family: 'OumaTrialLight', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        #search-input:focus { border-color: var(--accent); }
        #search-input::placeholder { color: var(--text2); }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 1rem;
            display: none;
            line-height: 1;
        }
        .search-clear.visible { display: block; }

        /* ── Filter bar ── */
        #filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-wrap: nowrap;
            scrollbar-width: none;
        }
        #filter-bar::-webkit-scrollbar { display: none; }

        .filter-label {
            font-size: 0.78rem;
            color: var(--text2);
            white-space: nowrap;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .filter-chip {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            font-family: 'OumaTrialLight', sans-serif;
        }
        .filter-chip:hover { border-color: var(--accent); color: var(--text); }
        .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .filter-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 4px; }

        #sort-select {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            font-family: 'OumaTrialLight', sans-serif;
            white-space: nowrap;
        }
        #sort-select:focus { border-color: var(--accent); }

        .toggle-chip {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.78rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            font-family: 'OumaTrialLight', sans-serif;
        }
        .toggle-chip.active { background: #1a3a2e; border-color: var(--new); color: var(--new); }

        /* ── Grid ── */
        #results-info {
            padding: 10px 24px 4px;
            font-size: 0.8rem;
            color: var(--text2);
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
            padding: 16px 24px 24px;
        }

        /* ── Card ── */
        .game-card {
            background: var(--card);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 8px 32px rgba(124,73,236,0.18);
        }
        .game-card:active { transform: translateY(0); }

        .card-cover {
            aspect-ratio: 160 / 74;
            overflow: hidden;
            background: var(--bg2);
            position: relative;
        }
        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        .game-card:hover .card-cover img { transform: scale(1.04); }

        .card-cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg2), var(--bg3));
            color: var(--text2);
            font-size: 2rem;
        }

        .card-badges {
            position: absolute;
            top: 6px;
            left: 6px;
            display: flex;
            gap: 4px;
            z-index: 2;
        }
        .badge {
            font-size: 0.65rem;
            font-family: 'OumaTrialBold', sans-serif;
            padding: 2px 6px;
            border-radius: 4px;
            letter-spacing: 0.05em;
        }
        .badge-new     { background: var(--new);    color: #000; }
        .badge-updated { background: var(--updated); color: #fff; }
        .badge-dev     { background: #f59e0b;        color: #000; }
        .badge-mod     { background: #ec4899;        color: #fff; }

        .card-body {
            padding: 10px 12px 12px;
        }
        .card-title {
            font-family: 'OumaTrialBold', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .card-developer {
            font-size: 0.75rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .card-rating {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.78rem;
            color: var(--gold);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-rating svg { width: 11px; height: 11px; fill: var(--gold); }

        /* ── Loading spinner ── */
        #spinner {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 48px;
        }
        #spinner.visible { display: flex; }
        .spin {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Load more / pagination ── */
        #load-more {
            display: none;
            justify-content: center;
            padding: 8px 24px 32px;
        }
        #load-more.visible { display: flex; }
        #load-more-btn {
            background: var(--bg2);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 8px;
            padding: 10px 32px;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'OumaTrialBold', sans-serif;
            transition: all 0.2s;
        }
        #load-more-btn:hover { background: var(--accent); color: #fff; }

        /* ── Empty state ── */
        #empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            color: var(--text2);
            gap: 12px;
            text-align: center;
        }
        #empty-state.visible { display: flex; }
        #empty-state .icon { font-size: 3rem; opacity: 0.4; }
        #empty-state p { font-size: 1rem; opacity: 0.7; }

        /* ── Error banner ── */
        #error-banner {
            display: none;
            align-items: center;
            gap: 12px;
            background: #2a1010;
            border: 1px solid #c33;
            border-radius: 8px;
            margin: 16px 24px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #f88;
        }
        #error-banner.visible { display: flex; }
        .error-close { margin-left: auto; cursor: pointer; font-size: 1.1rem; background: none; border: none; color: #f88; }

        /* ── Modal overlay ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            backdrop-filter: blur(4px);
            overflow-y: auto;
            padding: 24px 16px;
        }
        #modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }

        #modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%;
            max-width: 680px;
            overflow: hidden;
            position: relative;
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        .modal-hero {
            aspect-ratio: 160 / 60;
            position: relative;
            overflow: hidden;
            background: var(--bg3);
        }
        .modal-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.55);
        }
        .modal-hero-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .modal-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, var(--bg2) 0%, transparent 50%);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 14px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: background 0.15s;
        }
        .modal-close:hover { background: rgba(200,0,0,0.6); }

        .modal-body {
            padding: 20px 24px 28px;
        }

        .modal-title {
            font-family: 'OumaTrialBold', sans-serif;
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 6px;
        }

        .modal-sub {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .modal-dev {
            font-size: 0.85rem;
            color: var(--text2);
        }
        .modal-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.88rem;
            color: var(--gold);
        }
        .modal-rating svg { width: 13px; height: 13px; fill: var(--gold); }
        .modal-version {
            font-size: 0.8rem;
            color: var(--text2);
            background: var(--bg3);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }
        .modal-tag {
            font-size: 0.75rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 3px 10px;
            border-radius: 12px;
        }
        .modal-tag.genre { border-color: var(--accent); color: var(--accent2); }

        .modal-dl-section {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 14px;
        }
        .modal-dl-title {
            font-family: 'OumaTrialBold', sans-serif;
            font-size: 0.8rem;
            color: var(--text2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .modal-dl-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'OumaTrialBold', sans-serif;
            font-size: 0.88rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.18s;
            border: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            flex: 1;
            justify-content: center;
            min-width: 180px;
        }
        .btn-primary:hover { background: var(--accent2); }
        .btn-magnet {
            background: #1a2a1a;
            color: var(--new);
            border: 1px solid var(--new) !important;
        }
        .btn-magnet:hover { background: #22c55e22; }
        .btn-outline {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border) !important;
        }
        .btn-outline:hover { border-color: var(--text2) !important; color: var(--text); }
        .btn-icon { font-size: 1.05rem; }

        .modal-note {
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 10px;
            line-height: 1.5;
        }
        .modal-note a { color: var(--accent); text-decoration: none; }
        .modal-note a:hover { text-decoration: underline; }

        /* ── Floating nav slot ── */
        .floating-master-nav-slot {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: 56px;
            height: 56px;
            z-index: 90;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            header { padding: 0 12px; gap: 10px; height: 56px; }
            .logo { font-size: 1.1rem; }
            #filter-bar { padding: 8px 12px; }
            #game-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 12px; }
            #results-info { padding: 8px 12px 2px; }
            .modal-body { padding: 14px 16px 20px; }
            .modal-title { font-size: 1.2rem; }
            .btn-primary { min-width: 0; }
        }
    </style>
</head>
<body>

<!-- ── Header ── -->
<header>
    <div class="logo" onclick="resetFilters()">ateaish <span>gaming</span></div>
    <div class="search-wrap">
        <input id="search-input" type="search" placeholder="Search games…" autocomplete="off" spellcheck="false">
        <button class="search-clear" id="search-clear" title="Clear" onclick="clearSearch()">✕</button>
    </div>
</header>

<!-- ── Filter bar ── -->
<div id="filter-bar">
    <span class="filter-label">Sort</span>
    <select id="sort-select">
        <option value="lastUpdateDescending">Last updated ↓</option>
        <option value="lastUpdateAscending">Last updated ↑</option>
        <option value="ratingDescending">Rating ↓</option>
        <option value="ratingAscending">Rating ↑</option>
        <option value="popularityAllTime">Popular (all time)</option>
        <option value="popularityAllMonth">Popular (this month)</option>
        <option value="popularityAllWeek">Popular (this week)</option>
        <option value="titleAscending">Title A→Z</option>
        <option value="titleDescending">Title Z→A</option>
        <option value="releaseDateDescending">Release ↓</option>
        <option value="releaseDateAscending">Release ↑</option>
    </select>
    <div class="filter-divider"></div>
    <button class="toggle-chip" id="toggle-new"     data-key="is_new"     onclick="toggleFilter(this)">🆕 New</button>
    <button class="toggle-chip" id="toggle-updated" data-key="is_updated" onclick="toggleFilter(this)">🔄 Updated</button>
    <div class="filter-divider"></div>
    <span class="filter-label">Genre</span>
    <div id="genre-chips"></div>
</div>

<!-- ── Result count ── -->
<div id="results-info"></div>

<!-- ── Error ── -->
<div id="error-banner">
    <span id="error-msg"></span>
    <button class="error-close" onclick="dismissError()">✕</button>
</div>

<!-- ── Grid ── -->
<div id="game-grid"></div>

<!-- ── States ── -->
<div id="spinner"><div class="spin"></div></div>
<div id="empty-state">
    <div class="icon">🎮</div>
    <p>No games found. Try a different search or filter.</p>
</div>

<!-- ── Load more ── -->
<div id="load-more">
    <button id="load-more-btn" onclick="loadMore()">Load more games</button>
</div>

<!-- ── Floating nav ── -->
<div class="floating-master-nav-slot"></div>

<!-- ── Game Detail Modal ── -->
<div id="modal-overlay" onclick="closeModalIfBg(event)">
    <div id="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>

        <div class="modal-hero" id="modal-hero">
            <div class="modal-hero-placeholder">🎮</div>
        </div>

        <div class="modal-body">
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-sub">
                <span class="modal-dev" id="modal-dev"></span>
                <span class="modal-rating" id="modal-rating"></span>
                <span class="modal-version" id="modal-version"></span>
            </div>
            <div class="modal-tags" id="modal-tags"></div>

            <div class="modal-dl-section">
                <div class="modal-dl-title">Download</div>
                <div class="modal-dl-btns" id="modal-dl-btns"></div>
                <div class="modal-note" id="modal-dl-note"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* ════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const CFG = {
    DATA: 'data/games.json',
    IMG:  'https://images.gog-statics.com',
};

/* ════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let ALL_GAMES = [];   // full dataset loaded once
let FILTERED  = [];   // current filtered+sorted view

let state = {
    query:   '',
    sortBy:  'lastUpdateDescending',
    genres:  [],
    isNew:   false,
    isUpd:   false,
    shown:   36,      // how many cards currently visible
};

const PAGE_SIZE = 36;

/* ════════════════════════════════════════════
   DATA LOAD
═══════════════════════════════════════════════ */
async function loadData() {
    const r = await fetch(CFG.DATA);
    if (!r.ok) throw new Error(`Failed to load games.json: HTTP ${r.status}`);
    const payload = await r.json();
    ALL_GAMES = payload.games || [];
    buildGenreChips(payload.meta.genres || []);
}

/* ════════════════════════════════════════════
   CLIENT-SIDE FILTER + SORT
═══════════════════════════════════════════════ */
const SORT_FNS = {
    lastUpdateDescending:  (a,b) => (b.last_update||'').localeCompare(a.last_update||''),
    lastUpdateAscending:   (a,b) => (a.last_update||'').localeCompare(b.last_update||''),
    ratingDescending:      (a,b) => (b.rating||0) - (a.rating||0),
    ratingAscending:       (a,b) => (a.rating||0) - (b.rating||0),
    popularityAllTime:     (a,b) => (a.popularity_ranking||99999) - (b.popularity_ranking||99999),
    titleAscending:        (a,b) => a.title.localeCompare(b.title),
    titleDescending:       (a,b) => b.title.localeCompare(a.title),
    releaseDateDescending: (a,b) => (b.release_timestamp||0) - (a.release_timestamp||0),
    releaseDateAscending:  (a,b) => (a.release_timestamp||0) - (b.release_timestamp||0),
};

function applyFilters() {
    const q = state.query.toLowerCase();
    FILTERED = ALL_GAMES.filter(g => {
        if (q && !g.title.toLowerCase().includes(q) &&
                 !(g.developer||'').toLowerCase().includes(q) &&
                 !(g.publisher||'').toLowerCase().includes(q)) return false;
        if (state.isNew && !g.is_new)     return false;
        if (state.isUpd && !g.is_updated) return false;
        if (state.genres.length > 0) {
            const gameGenres = g.genres || [];
            if (!state.genres.every(sg => gameGenres.includes(sg))) return false;
        }
        return true;
    });

    const sortFn = SORT_FNS[state.sortBy] || SORT_FNS.lastUpdateDescending;
    FILTERED.sort(sortFn);
}

/* ════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function imgURL(hash) {
    return hash ? `${CFG.IMG}/${hash}.webp` : '';
}

function starSVG() {
    return `<svg viewBox="0 0 20 20"><path d="M10 1l2.39 4.84 5.35.78-3.87 3.77.91 5.32L10 13.27l-4.78 2.51.91-5.32-3.87-3.77 5.35-.78z"/></svg>`;
}

function renderCard(game) {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => openModal(game);

    const cover = imgURL(game.image);
    const coverHTML = cover
        ? `<img src="${cover}" alt="${escHtml(game.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-cover-placeholder>🎮</div>'">`
        : `<div class="card-cover-placeholder">🎮</div>`;

    let badges = '';
    if (game.is_new)     badges += `<span class="badge badge-new">NEW</span>`;
    if (game.is_updated) badges += `<span class="badge badge-updated">UPD</span>`;
    if (game.is_indev)   badges += `<span class="badge badge-dev">DEV</span>`;
    if (game.is_mod)     badges += `<span class="badge badge-mod">MOD</span>`;

    const rating = game.rating ? `<span class="card-rating">${starSVG()}${game.rating.toFixed(1)}</span>` : '';

    card.innerHTML = `
        <div class="card-cover">
            ${coverHTML}
            ${badges ? `<div class="card-badges">${badges}</div>` : ''}
        </div>
        <div class="card-body">
            <div class="card-title" title="${escHtml(game.title)}">${escHtml(game.title)}</div>
            <div class="card-meta">
                <span class="card-developer">${escHtml(game.developer||game.publisher||'')}</span>
                ${rating}
            </div>
        </div>`;
    return card;
}

/* ════════════════════════════════════════════
   RENDER FILTERED RESULTS
═══════════════════════════════════════════════ */
let searchTimer = null;
const grid = document.getElementById('game-grid');
const spinner = document.getElementById('spinner');
const emptyState = document.getElementById('empty-state');
const loadMoreWrap = document.getElementById('load-more');
const resultsInfo = document.getElementById('results-info');

function renderResults(reset = true) {
    if (reset) {
        state.shown = PAGE_SIZE;
        grid.innerHTML = '';
        emptyState.classList.remove('visible');
        loadMoreWrap.classList.remove('visible');
    }

    resultsInfo.textContent = `${FILTERED.length.toLocaleString()} games`;

    if (FILTERED.length === 0) {
        emptyState.classList.add('visible');
        return;
    }

    const slice = FILTERED.slice(0, state.shown);
    const frag  = document.createDocumentFragment();
    slice.forEach(g => frag.appendChild(renderCard(g)));
    grid.innerHTML = '';
    grid.appendChild(frag);

    if (state.shown < FILTERED.length) {
        loadMoreWrap.classList.add('visible');
    } else {
        loadMoreWrap.classList.remove('visible');
    }
}

function search() {
    applyFilters();
    renderResults(true);
}

function loadMore() {
    state.shown += PAGE_SIZE;
    renderResults(false);
}

/* ════════════════════════════════════════════
   FILTERS / CONTROLS
═══════════════════════════════════════════════ */
document.getElementById('search-input').addEventListener('input', e => {
    const v = e.target.value.trim();
    document.getElementById('search-clear').classList.toggle('visible', v.length > 0);
    state.query = v;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => search(), 480);
});

document.getElementById('sort-select').addEventListener('change', e => {
    state.sortBy = e.target.value;
    search();
});

function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    state.query = '';
    search();
}

function toggleFilter(btn) {
    btn.classList.toggle('active');
    const key = btn.dataset.key;
    if (key === 'is_new')     state.isNew = btn.classList.contains('active');
    if (key === 'is_updated') state.isUpd = btn.classList.contains('active');
    search();
}

function toggleGenre(chip, genre) {
    chip.classList.toggle('active');
    if (chip.classList.contains('active')) {
        if (!state.genres.includes(genre)) state.genres.push(genre);
    } else {
        state.genres = state.genres.filter(g => g !== genre);
    }
    search();
}

function resetFilters() {
    state.query = '';
    state.sortBy = 'lastUpdateDescending';
    state.genres = [];
    state.isNew = false;
    state.isUpd = false;

    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    document.getElementById('sort-select').value = 'lastUpdateDescending';
    document.getElementById('toggle-new').classList.remove('active');
    document.getElementById('toggle-updated').classList.remove('active');
    document.querySelectorAll('#genre-chips .filter-chip').forEach(c => c.classList.remove('active'));
    search();
}

/* ════════════════════════════════════════════
   GENRE CHIPS
═══════════════════════════════════════════════ */
function buildGenreChips(genres) {
    const wrap = document.getElementById('genre-chips');
    genres.forEach(g => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip';
        chip.textContent = g;
        chip.onclick = () => toggleGenre(chip, g);
        wrap.appendChild(chip);
    });
}

/* ════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
function openModal(game) {
    const overlay = document.getElementById('modal-overlay');

    // Hero image
    const heroEl = document.getElementById('modal-hero');
    const bgHash = game.background || game.image;
    if (bgHash) {
        heroEl.innerHTML = `
            <img src="${imgURL(bgHash)}" alt="" onerror="this.parentElement.innerHTML='<div class=modal-hero-placeholder>🎮</div>'">
            <div class="modal-hero-overlay"></div>`;
    } else {
        heroEl.innerHTML = `<div class="modal-hero-placeholder">🎮</div>`;
    }

    // Title/dev
    document.getElementById('modal-title').textContent = game.title;
    document.getElementById('modal-dev').textContent   = [game.developer, game.publisher].filter(Boolean).join(' / ');

    // Rating
    const ratingEl = document.getElementById('modal-rating');
    ratingEl.innerHTML = game.rating ? `${starSVG()} ${game.rating.toFixed(1)} / 5` : '';

    // Version
    document.getElementById('modal-version').textContent = game.gog_version ? `v${game.gog_version}` : '';

    // Tags / genres
    const tagsEl = document.getElementById('modal-tags');
    tagsEl.innerHTML = '';
    (game.genres||[]).forEach(g => {
        const t = document.createElement('span');
        t.className = 'modal-tag genre';
        t.textContent = g;
        tagsEl.appendChild(t);
    });
    (game.tags||[]).forEach(t => {
        const el = document.createElement('span');
        el.className = 'modal-tag';
        el.textContent = t;
        tagsEl.appendChild(el);
    });

    // Release year
    if (game.release_timestamp) {
        const yr = document.createElement('span');
        yr.className = 'modal-tag';
        yr.textContent = new Date(game.release_timestamp * 1000).getFullYear();
        tagsEl.prepend(yr);
    }

    // Download buttons
    const dlBtns = document.getElementById('modal-dl-btns');
    const dlNote = document.getElementById('modal-dl-note');
    dlBtns.innerHTML = '';
    dlNote.innerHTML = '';

    // Magnet link (if infohash available from search result)
    if (game.infohash) {
        const trackers = [
            'udp://tracker.opentrackr.org:1337/announce',
            'udp://exodus.desync.com:6969/announce',
            'udp://open.stealth.si:80/announce',
        ].map(t => `&tr=${encodeURIComponent(t)}`).join('');
        const magnet = `magnet:?xt=urn:btih:${game.infohash}${trackers}`;
        dlBtns.innerHTML += `
            <a class="btn-download btn-magnet" href="${magnet}">
                <span class="btn-icon">🧲</span> Torrent (Magnet)
            </a>`;
    }

    // Main download page link
    dlBtns.innerHTML += `
        <a class="btn-download btn-primary" href="https://gog-games.to/game/${game.slug}" target="_blank" rel="noopener">
            <span class="btn-icon">⬇️</span> Get Download Links
        </a>`;

    // GOG.com link
    if (game.gog_url) {
        dlBtns.innerHTML += `
            <a class="btn-download btn-outline" href="${game.gog_url}" target="_blank" rel="noopener">
                <span class="btn-icon">🛒</span> GOG.com
            </a>`;
    }

    dlNote.innerHTML = game.infohash
        ? `Direct download providers (gofile, 1fichier, pixeldrain, etc.) are available on the <a href="https://gog-games.to/game/${game.slug}" target="_blank">GOG Games page</a>.`
        : `All download options (gofile, 1fichier, pixeldrain, torrent…) are available on the <a href="https://gog-games.to/game/${game.slug}" target="_blank">GOG Games page</a>.`;

    // Show badges in modal if any
    const extra = [];
    if (game.is_indev)   extra.push('<span class="badge badge-dev">EARLY ACCESS</span>');
    if (game.is_mod)     extra.push('<span class="badge badge-mod">MOD</span>');
    if (extra.length) {
        const modBadgeEl = document.createElement('div');
        modBadgeEl.style.cssText = 'display:flex;gap:6px;margin-bottom:10px;';
        modBadgeEl.innerHTML = extra.join('');
        document.getElementById('modal-tags').before(modBadgeEl);
    }

    overlay.classList.add('visible');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal-overlay').classList.remove('visible');
    document.body.style.overflow = '';
}

function closeModalIfBg(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

/* ════════════════════════════════════════════
   ERROR
═══════════════════════════════════════════════ */
function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-banner').classList.add('visible');
}
function dismissError() {
    document.getElementById('error-banner').classList.remove('visible');
}

/* ════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function escHtml(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
spinner.classList.add('visible');

loadData()
    .then(() => {
        spinner.classList.remove('visible');
        search();
    })
    .catch(err => {
        spinner.classList.remove('visible');
        showError(`Could not load game data: ${err.message}`);
        emptyState.classList.add('visible');
    });
</script>
