name: Build Anime Home Snapshot

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: anime-home-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build anime home snapshot
        env:
          ANIME_HOME_HTTP_RETRIES: '5'
          ANIME_HOME_REQUEST_DELAY: '0.2'
        run: python anime/build_anime_home_snapshot.py

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A anime/anime_home_snapshot.json anime/cache/home-posters
          git diff --cached --quiet || git commit -m "Automated update: refresh anime home snapshot"
          git push