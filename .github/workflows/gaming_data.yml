name: Update Gaming Data

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day
  workflow_dispatch:
    inputs:
      full:
        description: 'Force full rescrape (ignores cache)'
        type: boolean
        default: false

jobs:
  update-games:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run scraper (incremental Mon–Sat, full on Sunday)
        run: |
          DAY=$(date +%u)   # 1=Mon … 7=Sun
          if [ "$DAY" = "7" ] || [ "${{ github.event.inputs.full }}" = "true" ]; then
            echo "Running full rescrape…"
            python3 gaming/scrape.py --full
          else
            echo "Running incremental scrape…"
            python3 gaming/scrape.py
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase
          git add gaming/data/games.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update gaming data [$(date -u +%Y-%m-%d)]"
          git push
