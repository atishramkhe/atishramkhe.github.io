name: Refresh Drama Snapshot

on:
  schedule:
    - cron: '20 3 * * *'
  workflow_dispatch:

jobs:
  refresh-drama-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build drama snapshot
        working-directory: ./drama
        run: python build_snapshot.py

      - name: Commit and push snapshot updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add drama/data/catalog_snapshot.json
          git diff --staged --quiet || git commit -m "Automated drama snapshot refresh"
          git push