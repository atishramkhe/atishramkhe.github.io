name: Refresh Drama Snapshot

on:
  schedule:
    - cron: '20 3 * * *'
  workflow_dispatch:

concurrency:
  group: drama-snapshot
  cancel-in-progress: false

jobs:
  refresh-drama-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build drama snapshot
        working-directory: ./drama
        run: python build_snapshot.py

      - name: Commit and push snapshot updates
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add drama/data/catalog_snapshot.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi

          git commit -m "Automated drama snapshot refresh"

          for attempt in 1 2 3; do
            git fetch origin "${BRANCH}"
            git rebase "origin/${BRANCH}"

            if git push origin "HEAD:${BRANCH}"; then
              exit 0
            fi

            echo "Push rejected on attempt ${attempt}; retrying after refetch"
            sleep $((attempt * 5))
          done

          echo "Failed to push snapshot update after 3 attempts"
          exit 1