name: Update Comics Catalog

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-comics-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Refresh comics catalog JSON
        run: npm run build:comics-catalog

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add comics/data/catalog.json comics/data/discovery.json package.json
          git diff --staged --quiet || git commit -m "Automated comics catalog update" && git push