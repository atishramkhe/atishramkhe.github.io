<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ateaish anime (beta)</title>
    <link rel="icon" type="image/png" href="assets/favicon_ateaish_anime.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script defer src="../master-navigation.js"></script>
    <style>
        @font-face{font-family:'OumaTrialBold';src:url('../fonts/OumaTrial-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap;}
        @font-face{font-family:'OumaTrialLight';src:url('../fonts/OumaTrial-Light.ttf') format('truetype');font-weight:300;font-style:normal;font-display:swap;}

        .material-symbols-outlined {
            font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 200, "opsz" 24;
            vertical-align: middle;
        }
        body {
            background: #000;
            color: #fff;
            margin: 0;
            font-family: 'OumaTrialLight', 'Segoe UI', Arial, sans-serif;
            --ateaish-master-nav-accent: #f1892f;
            --ateaish-master-nav-accent-rgb: 241, 137, 47;
            --ateaish-master-nav-text: #fff7f0;
        }
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 96px;
            border-bottom: 0;
            font-family:'OumaTrialBold','OumaTrialLight';
            position: relative;
            z-index: 2;
        }
        .logo-placeholder {
            width: 100px;
            height: 100px;
            background: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
        }
        .logo-placeholder img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .floating-master-nav-slot {
            position: fixed;
            right: 32px;
            bottom: 116px;
            width: 72px;
            height: 72px;
            z-index: 91;
        }
        /* Search bar: match /movies */
        #search-container{
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            position: relative;
            width: 100%;
            z-index: 2;
        }

        #search-input-wrapper {
            position: relative;
            width: 320px;
            margin-top: 16px;
        }

        #search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            pointer-events: none;
            font-size: 1.3em;
        }

        #search-input {
            width: 100%;
            padding: 0.5em 2.5em 0.5em 2.5em;
            font-size: 1.0em;
            background: #000;
            color: #fff;
            font-family: 'OumaTrialLight';
            border-top: none;
            border-right: none;
            border-left: none;
            border-bottom: none;
            border-radius: 10px;
        }
        #results {
            margin-top: 1em;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px 40px;
            width: 100%;
            max-width: 2000px;
            margin-left: auto;
            margin-right: auto;
        }
        #search-tools {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px 6px;
            max-width: 1400px;
        }
        #search-tools.visible {
            display: flex;
        }
        .search-filter-chip,
        .search-filter-select {
            background: #0d0d0d;
            color: #cfcfcf;
            border: 1px solid #242424;
            border-radius: 999px;
            font-family: 'OumaTrialLight';
            font-size: 0.88rem;
            padding: 8px 14px;
            transition: border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }
        .search-filter-chip {
            cursor: pointer;
        }
        .search-filter-chip:hover,
        .search-filter-select:hover,
        .search-filter-select:focus {
            border-color: rgba(241, 137, 47, 0.5);
            color: #fff;
            outline: none;
        }
        .search-filter-chip.active {
            background: rgba(241, 137, 47, 0.14);
            border-color: #f1892f;
            color: #f1892f;
        }
        .search-filter-select {
            min-width: 132px;
            cursor: pointer;
        }
        #search-status {
            min-height: 20px;
            padding: 0 40px;
            color: #9d9d9d;
            font-size: 0.82rem;
            text-align: center;
        }
        #browse-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 18px 24px 4px;
        }
        .toggle-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 122px;
            padding: 10px 16px;
            border-radius: 999px;
            background: #0d0d0d;
            color: #cfcfcf;
            border: 1px solid #242424;
            font-family: 'OumaTrialBold', 'OumaTrialLight';
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
        }
        .toggle-chip:hover {
            transform: translateY(-1px);
            border-color: rgba(241, 137, 47, 0.45);
            color: #fff;
        }
        .toggle-chip.active {
            background: rgba(241, 137, 47, 0.14);
            border-color: #f1892f;
            color: #f1892f;
        }
        .toggle-chip[data-state="off"] {
            color: #909090;
        }
        .result-item {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: black;
            width: 100px;
        }
        .result-item img {
            width: 92px;
            height: 138px;
            margin-bottom: 0.5em;
        }
        .result-item span {
            text-align: center;
        }
        
        #player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 100;
        }
        #player-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
                display: flex;
                flex-direction: column;
                gap: 12px;
        }
            .anime-player-stage {
                position: relative;
                flex: 1 1 auto;
                min-height: 0;
                border-radius: 18px;
                overflow: hidden;
                background:
                    radial-gradient(circle at top, rgba(241, 137, 47, 0.12), transparent 48%),
                    #000;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            }
            .anime-player-stage iframe {
                width: 100%;
                height: 100%;
                display: block;
                background: #000;
            }
            .anime-player-loading {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background:
                    radial-gradient(circle at 24% 35%, rgba(255, 190, 92, 0.16), transparent 28%),
                    radial-gradient(circle at 80% 66%, rgba(241, 137, 47, 0.18), transparent 24%),
                    linear-gradient(135deg, rgba(6, 6, 6, 0.97), rgba(12, 12, 12, 0.92));
                z-index: 5;
                transition: opacity 0.24s ease, visibility 0.24s ease;
            }
            .anime-player-loading.hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
            .anime-player-loading-card {
                position: relative;
                display: flex;
                align-items: center;
                gap: 24px;
                max-width: min(720px, 92%);
                padding: 28px 30px;
                border-radius: 24px;
                border: 1px solid rgba(241, 137, 47, 0.22);
                background: rgba(8, 8, 8, 0.72);
                backdrop-filter: blur(14px);
                box-shadow: 0 24px 90px rgba(0, 0, 0, 0.55);
            }
            .anime-player-loading-figure {
                position: relative;
                width: clamp(150px, 22vw, 240px);
                flex: 0 0 auto;
            }
            .anime-player-loading-figure img {
                display: block;
                width: 100%;
                height: auto;
                filter: drop-shadow(0 0 14px rgba(241, 137, 47, 0.24));
                animation: anime-loading-float 1.8s ease-in-out infinite;
            }
            .anime-player-loading-beam {
                position: absolute;
                top: 54%;
                left: 72%;
                width: clamp(120px, 22vw, 220px);
                height: 26px;
                border-radius: 999px;
                transform-origin: left center;
                transform: translateY(-50%);
                background: linear-gradient(90deg, rgba(255, 244, 189, 0.95), rgba(255, 191, 79, 0.88) 38%, rgba(241, 137, 47, 0.12) 100%);
                box-shadow:
                    0 0 18px rgba(255, 200, 91, 0.65),
                    0 0 42px rgba(241, 137, 47, 0.34);
                animation: anime-loading-beam 1.1s ease-in-out infinite;
            }
            .anime-player-loading-beam::before,
            .anime-player-loading-beam::after {
                content: '';
                position: absolute;
                inset: -8px 0;
                border-radius: inherit;
                background: inherit;
                opacity: 0.52;
                filter: blur(11px);
            }
            .anime-player-loading-copy {
                min-width: 0;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .anime-player-loading-kicker {
                color: #f7bf58;
                font-size: 0.78rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                font-family: 'OumaTrialBold', 'OumaTrialLight';
            }
            .anime-player-loading-title {
                color: #fff8ec;
                font-family: 'OumaTrialBold', 'OumaTrialLight';
                font-size: clamp(1.2rem, 2vw, 1.9rem);
                line-height: 1.05;
            }
            .anime-player-loading-subtitle {
                color: rgba(255, 245, 234, 0.78);
                font-size: 0.9rem;
                max-width: 32ch;
            }
            .anime-player-loading-progress {
                position: relative;
                width: min(260px, 100%);
                height: 8px;
                overflow: hidden;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.08);
            }
            .anime-player-loading-progress::after {
                content: '';
                position: absolute;
                inset: 0;
                width: 42%;
                border-radius: inherit;
                background: linear-gradient(90deg, #fff0b4, #f7bf58, #f1892f);
                box-shadow: 0 0 18px rgba(241, 137, 47, 0.48);
                animation: anime-loading-progress 1s ease-in-out infinite;
            }
            .anime-player-footer {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 40px;
            }
            #anime-skip-controls {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
                padding: 7px 12px;
                border-radius: 999px;
                border: 1px solid rgba(241, 137, 47, 0.3);
                background: rgba(17, 10, 2, 0.92);
                box-shadow: 0 12px 34px rgba(0, 0, 0, 0.34);
                backdrop-filter: blur(10px);
                font-family: inherit;
                font-size: 0.76rem;
            }
            #anime-skip-controls .anime-skip-toggle {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-width: 220px;
                padding: 8px 14px;
                border-radius: 999px;
                border: 1px solid rgba(241, 137, 47, 0.45);
                background: rgba(255, 255, 255, 0.03);
                color: #f7bf58;
                cursor: pointer;
                user-select: none;
                white-space: nowrap;
                transition: background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, color 0.16s ease;
            }
            #anime-skip-controls .anime-skip-toggle.active {
                background: linear-gradient(135deg, #f7bf58, #f1892f);
                border-color: #f7bf58;
                box-shadow: 0 0 10px rgba(241, 137, 47, 0.34);
                color: #1a1103;
            }
        #close-player {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 3em;
            color: white;
            cursor: pointer;
        }
        /* Anime player source indicators (like /movies server dots) */
        #anime-source-indicators {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 8px 0 0 8px;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 101;
            flex-wrap: wrap;
        }

        #anime-source-indicators .group-label {
            color: #fff;
            font-weight: 600;
            margin-left: 10px;
            margin-right: 8px;
            user-select: none;
        }

        #anime-source-indicators .group-label.first {
            margin-left: 0;
        }

        #anime-source-indicators .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #222;
            cursor: pointer;
            transition: background .2s, transform .2s, box-shadow .2s;
            position: relative;
        }

        #anime-source-indicators .indicator.active {
            background: #f1892f;
            box-shadow: 0 0 4px #f1892f;
        }

        #anime-source-indicators .indicator:hover {
            transform: scale(1.3);
        }

        #anime-source-indicators .indicator:hover::after {
            content: attr(data-source-name);
            position: absolute;
            left: 50%;
            bottom: calc(100% + 8px);
            transform: translateX(-50%);
            padding: 5px 8px;
            border-radius: 8px;
            background: rgba(8, 8, 8, 0.92);
            color: #fff;
            font-size: 11px;
            line-height: 1.2;
            white-space: nowrap;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* Legacy pill buttons (no longer used, kept for safety) */
        .source-switcher {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 101;
            display: none;
            gap: 8px;
        }

        .episode-controls {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 12px;
            border-radius: 999px;
            border: none;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
        }
        .episode-controls label {
            font-size: 0.8rem;
            color: #ddd;
            white-space: nowrap;
        }
        .episode-controls select {
            background: #000;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 2px 10px;
            font-family: 'OumaTrialLight', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }
        
            /* Match /movies season/episode selector look */
            #season-episode-selector {
                position: absolute;
                top: 12px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1001;
                display: flex;
                align-items: center;
                gap: 12px;
                background: rgba(0,0,0,0.7);
                border-radius: 8px;
                padding: 8px 18px;
                box-shadow: 0 2px 8px #0008;
            }
        
            #season-episode-selector select {
                font-size: 1em;
                font-family: inherit;
                padding: 4px 8px;
                border-radius: 4px;
                border: none;
                background: #000;
                color: #fff;
                outline: none;
            }

            /* Episode arrows (like /movies) */
            .episode-arrow {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                background: transparent;
                border: none;
                color: #fff;
                font-size: 2.8em;
                border-radius: 50%;
                width: 56px;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                z-index: 101;
                transition: transform 0.12s ease, color 0.12s ease;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }

            .episode-arrow:hover {
                transform: translateY(-50%) scale(1.05);
                color: #f1892f;
            }

            .episode-arrow:disabled {
                opacity: 0.25;
                cursor: not-allowed;
            }

            #anime-prev-episode {
                left: 12px;
            }

            #anime-next-episode {
                right: 12px;
            }

        /* Settings button (bottom-right inside player) */
        .anime-settings-btn {
            position: absolute;
            right: 16px;
            bottom: 16px;
            z-index: 101;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.75);
            color: #fff;
            font-family: 'OumaTrialLight', sans-serif;
            font-size: 1.05rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(6px);
        }

        .anime-settings-btn:hover {
            border-color: #777;
        }
        @keyframes anime-loading-float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.02); }
        }
        @keyframes anime-loading-beam {
            0%, 100% { transform: translateY(-50%) scaleX(0.92); opacity: 0.84; }
            50% { transform: translateY(-50%) scaleX(1.05); opacity: 1; }
        }
        @keyframes anime-loading-progress {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(300%); }
        }
        .source-switcher button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .source-switcher button {
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid #555;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-family: 'OumaTrialLight', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .source-switcher button.active {
            background: #f1892f;
            border-color: #f1892f;
        }
        
        h2 {
            padding-left: 40px;
            margin-block-end: 0;
            margin-block-start: 1.5em;
        }
        .grid, .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 40px;
            max-width: 2000px;
            margin: 0 auto;
        }
        /* Poster hover behavior: match /movies */
        .poster {
            cursor: pointer;
            border-radius: 0;
            overflow: visible;
            box-shadow: 0 2px 12px #000a;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            background: #090909;
            position: relative;
            transform-origin: top center;
            --hover-scale: 1.5;
        }

        .poster:hover {
            transform: scale(var(--hover-scale));
            z-index: 30;
            box-shadow: 0 8px 32px #000c;
        }

        .poster img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            background: #000;
        }

        .poster-title-strip {
            padding: 10px 10px 12px;
            background: #0d0d0d;
            min-height: 66px;
            box-sizing: border-box;
        }

        .poster-title-main {
            font-family: 'OumaTrialBold', 'OumaTrialLight';
            font-size: 0.95rem;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .poster-title-meta {
            margin-top: 6px;
            color: #b7b7b7;
            font-size: 0.74rem;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .poster-info {
            display: none;
            position: absolute;
            top: calc(100% - 1px);
            left: 0;
            width: 100%;
            background: #000;
            color: #fff;
            padding: 12px 10px;
            line-height: 1.35;
            box-sizing: border-box;
            border: 1px solid #000;
            margin: 0;
            z-index: 40;
        }

        .poster:hover .poster-info {
            display: block;
            font-size: 0.75em;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-button {
            display: none;
        }
        #clear-search-btn {
            position: absolute;
            right: 0rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            z-index: 2;
            display: none;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #000;
            min-width: 120px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            padding: 8px 0;
            z-index: 3;
            right: 0;
            top: 100%;
            border-radius: 8px;
        }

        .dropdown.open .dropdown-content,
        .dropdown:hover .dropdown-content,
        .dropdown:focus-within .dropdown-content {
            display: block;
        }
        .dropdown-content a {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            text-decoration: none;
            background: none;
        }
        .dropdown-content a img {
            height: 100px;
            width: 100px;
            object-fit: contain;
            margin: 0;
            padding: 0;
        }

        @media (max-width: 700px) {
            #browse-controls {
                padding-left: 16px;
                padding-right: 16px;
            }
            .anime-player-loading-card {
                flex-direction: column;
                text-align: center;
                gap: 14px;
                padding: 22px 18px;
            }
            .anime-player-loading-copy {
                align-items: center;
            }
            .anime-player-loading-subtitle {
                max-width: 28ch;
            }
            .anime-player-loading-beam {
                top: 56%;
                left: 62%;
                width: 108px;
                height: 18px;
            }
        }
        @media (max-width: 640px) {
            #anime-source-indicators {
                top: 8px;
                left: 10px;
                right: 10px;
                gap: 4px;
            }
            #season-episode-selector {
                top: auto;
                bottom: 12px;
                width: calc(100% - 24px);
                justify-content: center;
                padding: 8px 10px;
            }
            #season-episode-selector select {
                max-width: 46%;
            }
            #anime-skip-controls {
                gap: 8px;
                padding: 6px 10px;
                font-size: 0.72rem;
            }
        
            #search-tools {
                padding-left: 16px;
                padding-right: 16px;
            }
            .floating-master-nav-slot {
                right: 24px;
                bottom: 118px;
