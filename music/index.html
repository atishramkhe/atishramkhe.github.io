<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ateaish Music</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23101820'/%3E%3Cpath d='M42 14v27.5a7.5 7.5 0 1 1-3-6V22l-16 3.2v20.3a7.5 7.5 0 1 1-3-6V20.8L42 14Z' fill='%23f4b942'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Ateaish Music</p>
        <h1>Music</h1>
      </div>
    </header>

    <main class="layout">
      <section class="panel search-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Search</p>
            <h2>Catalog</h2>
          </div>
        </div>

        <form id="search-form" class="search-form">
          <input id="search-input" name="query" type="search" placeholder="Search for a track, artist, or album" autocomplete="off" required>
          <button type="submit">Search</button>
        </form>

        <p id="search-feedback" class="feedback">Start with a track title or artist.</p>
        <div id="results-container" class="results-grid"></div>
      </section>

      <section class="panel player-panel">
        <div class="panel-header compact-header">
          <div>
            <p class="eyebrow">Playback</p>
            <h2>Now Playing</h2>
          </div>
          <button id="next-track-button" class="ghost-button" type="button">Next in Queue</button>
        </div>

        <div id="player-shell"></div>
      </section>

      <section class="panel queue-panel">
        <div class="panel-header compact-header">
          <div>
            <p class="eyebrow">Queue</p>
            <h2>Up Next</h2>
          </div>
          <button id="save-queue-playlist-button" class="ghost-button" type="button">Save Queue</button>
        </div>
        <div id="queue-container"></div>
      </section>

      <section class="panel library-panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Library</p>
            <h2>Favorites, recents, playlists</h2>
          </div>
          <form id="playlist-form" class="playlist-form">
            <input id="playlist-name-input" name="name" type="text" placeholder="New playlist name" required>
            <button type="submit">Create</button>
          </form>
        </div>
        <div id="library-container"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
